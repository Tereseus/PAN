<!DOCTYPE html>
<html><head><style>
body {
  margin: 0; padding: 0;
  width: 256px; height: 256px;
  background: #0d1b3e;
  display: flex; align-items: center; justify-content: center;
  border-radius: 40px;
}
/* Draw Π manually with CSS so it's unmistakably Pi, not II */
.pi {
  position: relative;
  width: 160px;
  height: 160px;
}
/* Top bar */
.pi::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 160px;
  height: 28px;
  background: white;
  border-radius: 4px;
}
/* Left leg */
.leg-left {
  position: absolute;
  top: 0; left: 20px;
  width: 28px;
  height: 160px;
  background: white;
  border-radius: 4px;
}
/* Right leg */
.leg-right {
  position: absolute;
  top: 0; right: 20px;
  width: 28px;
  height: 160px;
  background: white;
  border-radius: 4px;
}
</style></head>
<body>
  <div class="pi">
    <div class="leg-left"></div>
    <div class="leg-right"></div>
  </div>
</body></html>
