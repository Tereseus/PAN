<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAN Doc Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  :root {
    --bg: #11111b;
    --bg2: #181825;
    --bg3: #1e1e2e;
    --fg: #cdd6f4;
    --muted: #a6adc8;
    --accent: #f5c2e7;
    --accent2: #89b4fa;
    --green: #a6e3a1;
    --yellow: #f9e2af;
    --red: #f38ba8;
    --border: #313244;
    --prose-width: 72ch;
    --wide-width: 1200px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.65;
  }

  /* Layout: sticky TOC sidebar + main column */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .toc { display: none; }
  }

  .toc {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 24px 20px 80px;
    position: sticky; top: 0;
    align-self: start;
    height: 100vh;
    overflow-y: auto;
    font-size: 0.88em;
  }
  .toc h4 {
    color: var(--muted);
    text-transform: uppercase;
    font-size: 0.72em;
    letter-spacing: 0.08em;
    margin: 0 0 12px;
    font-weight: 600;
  }
  .toc ul { list-style: none; padding: 0; margin: 0; }
  .toc li { margin: 2px 0; }
  .toc a {
    color: var(--muted);
    text-decoration: none;
    display: block;
    padding: 4px 8px;
    border-radius: 4px;
    border-left: 2px solid transparent;
    transition: all 0.1s;
  }
  .toc a:hover { color: var(--fg); background: var(--bg3); }
  .toc a.active { color: var(--accent); border-left-color: var(--accent); background: var(--bg3); }
  .toc .lvl-3 { padding-left: 18px; font-size: 0.92em; }
  .toc .lvl-4 { padding-left: 32px; font-size: 0.88em; }

  .main {
    padding: 56px 64px 120px;
    max-width: var(--wide-width);
    width: 100%;
  }

  /* Prose stays narrow; tables/pre can break out wider */
  .main p,
  .main ul,
  .main ol,
  .main blockquote,
  .main h1,
  .main h2,
  .main h3,
  .main h4 {
    max-width: var(--prose-width);
  }
  .main pre,
  .main table,
  .main img {
    max-width: 100%;
  }

  h1, h2, h3, h4 {
    color: var(--accent);
    margin-top: 2em;
    margin-bottom: 0.5em;
    line-height: 1.25;
  }
  h1 { font-size: 2.2em; border-bottom: 2px solid var(--border); padding-bottom: 0.3em; margin-top: 0.3em; }
  h2 { font-size: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
  h3 { font-size: 1.25em; color: var(--accent2); }
  h4 { font-size: 1.05em; color: var(--green); }
  p { margin: 0.8em 0; }
  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }
  strong { color: var(--yellow); }
  em { color: var(--muted); }

  code {
    background: var(--bg3);
    color: var(--green);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
    font-size: 0.92em;
  }
  pre {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 1em 0;
  }
  pre code {
    background: none;
    color: var(--fg);
    padding: 0;
    font-size: 0.88em;
    line-height: 1.55;
  }

  table {
    border-collapse: collapse;
    margin: 1em 0;
    width: 100%;
    background: var(--bg2);
    border-radius: 6px;
    overflow: hidden;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
  }
  th { background: var(--bg3); color: var(--accent); font-weight: 600; }
  tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  blockquote {
    border-left: 4px solid var(--accent);
    margin: 1em 0;
    padding: 0.5em 1em;
    background: var(--bg2);
    color: var(--muted);
  }
  ul, ol { padding-left: 1.6em; }
  li { margin: 0.3em 0; }
  hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

  .topbar {
    grid-column: 1 / -1;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0;
    z-index: 20;
  }
  .topbar .title { color: var(--accent); font-weight: 600; }
  .topbar .meta { color: var(--muted); font-size: 0.85em; }
  .refresh-btn {
    margin-left: auto;
    background: var(--bg3);
    color: var(--accent2);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85em;
    transition: all 0.1s;
  }
  .refresh-btn:hover { background: var(--accent2); color: var(--bg); border-color: var(--accent2); }
  .topbar .read-time {
    color: var(--muted);
    font-size: 0.8em;
    background: var(--bg3);
    padding: 4px 10px;
    border-radius: 12px;
  }

  .frontmatter {
    background: var(--bg2);
    border-left: 4px solid var(--accent2);
    padding: 14px 20px;
    margin: 0 0 2em;
    border-radius: 4px;
    font-size: 0.9em;
    color: var(--muted);
    max-width: var(--prose-width);
  }
  .frontmatter strong {
    color: var(--accent);
    display: inline-block;
    min-width: 110px;
  }
</style>
</head>
<body>
<div class="layout">
  <div class="topbar">
    <span class="title">PAN Doc Viewer</span>
    <span class="meta" id="meta"></span>
    <button class="refresh-btn" id="refreshBtn" title="Reload">↻ Refresh</button>
    <span class="read-time" id="readTime"></span>
  </div>
  <aside class="toc">
    <h4>Contents</h4>
    <ul id="tocList"></ul>
  </aside>
  <main class="main" id="content">Loading…</main>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const file = params.get('file') || 'project_tier0_org_foundation.md';
  const isTeX = file.endsWith('.tex');
  document.getElementById('meta').textContent = file;
  document.title = 'PAN — ' + file;

  // Capitalize first letter of frontmatter keys
  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  // Render LaTeX math expressions using KaTeX.
  // Processes $$...$$ (display) and $...$ (inline) in markdown text.
  function renderMath(text) {
    if (typeof katex === 'undefined') return text;
    // Display math: $$...$$ (can span lines)
    text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => {
      try { return katex.renderToString(expr.trim(), { displayMode: true, throwOnError: false }); }
      catch { return '$$' + expr + '$$'; }
    });
    // Inline math: $...$ (single line, not greedy, avoid $$)
    text = text.replace(/(?<!\$)\$(?!\$)([^\n$]+?)\$(?!\$)/g, (_, expr) => {
      try { return katex.renderToString(expr.trim(), { displayMode: false, throwOnError: false }); }
      catch { return '$' + expr + '$'; }
    });
    return text;
  }

  // For .tex files: render the entire content as a LaTeX document
  function renderTeXDocument(texSource) {
    if (typeof katex === 'undefined') return '<p style="color:var(--red)">KaTeX not loaded</p>';
    // Strip LaTeX preamble/document commands, extract body
    let body = texSource;
    const bodyMatch = texSource.match(/\\begin\{document\}([\s\S]*?)\\end\{document\}/);
    if (bodyMatch) body = bodyMatch[1];
    // Split into paragraphs and render each math environment
    const blocks = body.split(/\n\n+/);
    return blocks.map(block => {
      block = block.trim();
      if (!block) return '';
      // Render equation environments
      const envMatch = block.match(/\\begin\{(equation|align|gather|multline)\*?\}([\s\S]*?)\\end\{\1\*?\}/);
      if (envMatch) {
        try { return '<div class="katex-display">' + katex.renderToString(envMatch[2].trim(), { displayMode: true, throwOnError: false }) + '</div>'; }
        catch { return '<pre>' + block + '</pre>'; }
      }
      // Standalone math with \[ ... \]
      const displayMatch = block.match(/\\\[([\s\S]*?)\\\]/);
      if (displayMatch) {
        try { return '<div class="katex-display">' + katex.renderToString(displayMatch[1].trim(), { displayMode: true, throwOnError: false }) + '</div>'; }
        catch { return '<pre>' + block + '</pre>'; }
      }
      // Section/subsection headings
      const secMatch = block.match(/\\(sub)*section\*?\{(.+?)\}/);
      if (secMatch) {
        const level = secMatch[1] ? (secMatch[1] === 'subsub' ? 4 : 3) : 2;
        return `<h${level}>${secMatch[2]}</h${level}>`;
      }
      // Title
      const titleMatch = block.match(/\\title\{(.+?)\}/);
      if (titleMatch) return `<h1>${titleMatch[1]}</h1>`;
      // Author/date
      if (block.match(/\\(author|date|maketitle)/)) return '';
      // Strip remaining simple commands and render inline math
      let html = block
        .replace(/\\textbf\{(.+?)\}/g, '<strong>$1</strong>')
        .replace(/\\textit\{(.+?)\}/g, '<em>$1</em>')
        .replace(/\\emph\{(.+?)\}/g, '<em>$1</em>')
        .replace(/\\href\{(.+?)\}\{(.+?)\}/g, '<a href="$1">$2</a>')
        .replace(/\\\\$/gm, '<br>')
        .replace(/\\item\s*/g, '• ');
      html = renderMath(html);
      return `<p>${html}</p>`;
    }).join('\n');
  }

  function slugify(text) {
    return text.toLowerCase().trim()
      .replace(/[^\w\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-');
  }

  async function load() {
    // Reset state before each load so refresh actually refreshes
    document.getElementById('content').innerHTML = 'Loading…';
    document.getElementById('tocList').innerHTML = '';
    document.getElementById('readTime').textContent = '';
    try {
      // Cache-bust so the browser doesn't serve a stale .md
      const r = await fetch('./' + file + '?t=' + Date.now());
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      let md = await r.text();

      // Strip + render frontmatter
      let frontmatter = '';
      const fmMatch = md.match(/^---\n([\s\S]*?)\n---\n/);
      if (fmMatch) {
        const fm = fmMatch[1];
        const lines = fm.split('\n').map(l => {
          const m = l.match(/^(\w+):\s*(.*)$/);
          return m ? `<strong>${cap(m[1])}:</strong> ${m[2]}` : l;
        });
        frontmatter = `<div class="frontmatter">${lines.join('<br>')}</div>`;
        md = md.slice(fmMatch[0].length);
      }

      // Reading time estimate (avg 240 wpm for technical content)
      const wordCount = md.split(/\s+/).filter(Boolean).length;
      const minutes = Math.max(1, Math.round(wordCount / 240));
      document.getElementById('readTime').textContent = `${wordCount.toLocaleString()} words · ~${minutes} min read`;

      // Configure marked with heading IDs for TOC.
      // Marked v5+ renderer signature: heading({tokens, depth, raw, text})
      const renderer = new marked.Renderer();
      const headings = [];
      renderer.heading = function(arg, maybeLevel) {
        // Support both old (text, level) and new ({tokens, depth, text}) signatures
        let text, level;
        if (typeof arg === 'object' && arg !== null) {
          text = arg.text || (arg.tokens ? this.parser.parseInline(arg.tokens) : '');
          level = arg.depth;
        } else {
          text = arg;
          level = maybeLevel;
        }
        const plainText = String(text).replace(/<[^>]+>/g, '');
        const id = slugify(plainText);
        if (level >= 1 && level <= 4) headings.push({ level, text: plainText, id });
        return `<h${level} id="${id}">${text}</h${level}>`;
      };
      marked.setOptions({ renderer });

      let html;
      if (isTeX) {
        html = renderTeXDocument(md);
      } else {
        // Render math expressions before markdown parsing
        md = renderMath(md);
        html = DOMPurify.sanitize(marked.parse(md), { ADD_ATTR: ['id', 'class', 'style'], ADD_TAGS: ['span', 'math', 'semantics', 'mrow', 'mi', 'mn', 'mo', 'msup', 'msub', 'mfrac', 'mover', 'munder', 'annotation'] });
      }
      document.getElementById('content').innerHTML = frontmatter + html;
      document.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));

      // Build TOC
      const tocList = document.getElementById('tocList');
      headings.forEach(h => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.text;
        a.className = 'lvl-' + h.level;
        a.dataset.id = h.id;
        li.appendChild(a);
        tocList.appendChild(li);
      });

      // Active section highlight on scroll
      const tocLinks = Array.from(tocList.querySelectorAll('a'));
      const headingEls = headings.map(h => document.getElementById(h.id)).filter(Boolean);
      function onScroll() {
        let active = headingEls[0];
        const offset = 100;
        for (const el of headingEls) {
          if (el.getBoundingClientRect().top < offset) active = el;
          else break;
        }
        tocLinks.forEach(a => a.classList.toggle('active', a.dataset.id === active?.id));
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    } catch (e) {
      document.getElementById('content').innerHTML = '<p style="color:var(--red)">Failed to load: ' + e.message + '</p>';
    }
  }
  document.getElementById('refreshBtn').addEventListener('click', load);
  load();
</script>
</body>
</html>
