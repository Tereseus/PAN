<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="/v2/pan-telemetry.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PAN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#0a0a0f; --bg2:#1e1e2e; --bg3:#313244; --text:#cdd6f4; --text2:#6c7086; --accent:#89b4fa; --green:#a6e3a1; --red:#f38ba8; --border:#313244; --radius:8px; }
body { background:#0a0a0f; color:#cdd6f4; font-family:-apple-system,system-ui,sans-serif; font-size:14px; }

/* Top bar — sticky */
.topbar { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:20; }
.topbar h1 { font-size:16px; color:var(--accent); white-space:nowrap; }
.topbar select { flex:1; background:var(--bg2); color:var(--text); border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px; font-size:13px; }

/* Tabs */
.tabs { display:flex; border-bottom:1px solid var(--border); overflow-x:auto; background:var(--bg); position:sticky; top:42px; z-index:19; }
.tabs::-webkit-scrollbar { display:none; }
.tab { padding:10px 14px; color:var(--text2); cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; font-size:13px; font-weight:500; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* Pages */
.page { display:none; }
.page.active { display:block; }

/* Terminal-style chat — matches desktop terminal renderer */
.messages { display:flex; flex-direction:column; padding:8px 10px; min-height:200px; background:#11111b; font-family:"JetBrains Mono","Cascadia Code",Consolas,monospace; font-size:13px; line-height:1.4; }
.t-line { padding:0; margin:0; word-break:break-word; white-space:pre-wrap; }
.t-user { margin-top:6px; color:#cdd6f4; }
.t-user .name { color:#a6e3a1; font-weight:bold; }
.t-user .sep { color:#89b4fa; }
.t-assistant { margin-top:4px; color:#bac2de; }
.t-assistant .name { color:#cba6f7; font-weight:bold; }
.t-assistant .sep { color:#89b4fa; }
.t-tool { color:#f9e2af; padding-left:2px; }
.t-tool .arrow { color:#6c7086; }
.t-pending { opacity:0.5; font-style:italic; }
.status-bar { display:flex; align-items:center; gap:8px; padding:5px 10px; background:#181825; border-top:1px solid #313244; font-size:12px; color:#cba6f7; }
.spinner { display:inline-block; width:10px; height:10px; border:2px solid #313244; border-top-color:#cba6f7; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Approvals banner — sticky at top, visible on every tab */
.approvals-banner { position:sticky; top:80px; z-index:18; background:#f9e2af; color:#1e1e2e; padding:10px 12px; border-top:1px solid #d4a72c; border-bottom:1px solid #d4a72c; display:none; }
.approvals-banner.visible { display:block; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{background:#f9e2af} 50%{background:#fab387} }
.approvals-banner .hdr { font-weight:700; font-size:13px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.approvals-banner .hdr .count { background:#1e1e2e; color:#f9e2af; border-radius:10px; padding:1px 8px; font-size:11px; }
.approvals-item { background:#fff; border-radius:6px; padding:8px 10px; margin-top:6px; }
.approvals-item .prompt { font-size:12px; color:#1e1e2e; word-break:break-word; margin-bottom:6px; max-height:60px; overflow:hidden; text-overflow:ellipsis; }
.approvals-item .btns { display:flex; gap:6px; }
.approvals-item button { flex:1; border:none; border-radius:4px; padding:8px; font-size:13px; font-weight:600; cursor:pointer; }
.approvals-item .allow-btn { background:#a6e3a1; color:#1e1e2e; }
.approvals-item .deny-btn { background:#f38ba8; color:#1e1e2e; }
.tab .badge { display:inline-block; background:#f38ba8; color:#1e1e2e; border-radius:10px; padding:1px 6px; font-size:10px; font-weight:700; margin-left:4px; }
.input-bar { display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border); background:var(--bg); position:sticky; bottom:0; z-index:5; }
.input-bar input { flex:1; background:var(--bg2); color:var(--text); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; font-size:14px; outline:none; font-family:inherit; }
.input-bar button { background:var(--accent); color:#000; border:none; border-radius:var(--radius); padding:10px 16px; font-weight:600; font-size:14px; }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin:6px 12px; }
.card h3 { font-size:14px; margin-bottom:6px; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:12px; text-align:center; }
.stat-val { font-size:22px; font-weight:700; color:var(--accent); }
.stat-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

/* Progress */
.progress-bg { background:var(--bg3); border-radius:4px; height:6px; overflow:hidden; margin:4px 0; }
.progress-fill { background:var(--accent); height:100%; border-radius:4px; transition:width 0.3s; }

/* Milestone */
.milestone { margin:6px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.milestone-header { padding:10px 12px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
.milestone-header:active { background:var(--bg3); }
.milestone-name { font-size:13px; font-weight:600; }
.milestone-pct { font-size:12px; color:var(--accent); font-weight:600; }
.milestone-tasks { display:none; padding:0 12px 10px; }
.milestone-tasks.open { display:block; }
.task-row { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; border-bottom:1px solid var(--bg3); }
.task-row:last-child { border:none; }
.task-check { color:var(--green); }
.task-open { color:var(--text2); }

/* Events */
.event-row { display:flex; justify-content:space-between; padding:8px 12px; border-bottom:1px solid var(--bg3); font-size:13px; }
.event-type { color:var(--accent); font-weight:500; }
.event-time { color:var(--text2); font-size:11px; }
.event-text { color:var(--text); font-size:12px; margin-top:2px; }

/* Sensors */
.sensor-device { margin:6px 12px; }
.sensor-device h3 { padding:8px 0; font-size:14px; }
.sensor-row { display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:4px; }
.sensor-name { font-size:13px; }
.sensor-val { font-size:13px; color:var(--accent); }

/* Settings */
.setting-row { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--bg3); }
.setting-label { font-size:13px; }
.setting-val { font-size:13px; color:var(--accent); max-width:60%; text-align:right; word-break:break-all; }

.muted { color:var(--text2); text-align:center; padding:30px 20px; font-size:14px; }
.section-title { font-size:13px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; padding:12px 12px 4px; }
</style>
</head>
<body>

<!-- Top bar with project selector -->
<div class="topbar">
  <h1>Π</h1>
  <select id="project-select" onchange="onProjectChange()">
    <option value="">Select project...</option>
  </select>
</div>

<!-- Tabs -->
<div class="tabs" id="tab-bar">
  <div class="tab active" data-tab="chat">Chat</div>
  <div class="tab" data-tab="projects">Projects</div>
  <div class="tab" data-tab="sensors">Sensors</div>
  <div class="tab" data-tab="data">Data</div>
  <div class="tab" data-tab="settings">Settings</div>
</div>

<!-- Approvals banner — sticky, visible on every tab when something is pending -->
<div id="approvals-banner" class="approvals-banner">
  <div class="hdr">⚠ Pending approval <span class="count" id="approvals-count">0</span></div>
  <div id="approvals-list"></div>
</div>

<!-- CHAT / TERMINAL — terminal-style transcript + input -->
<div id="chat" class="page active">
  <div class="messages" id="chat-msgs"><div class="muted">Loading conversations...</div></div>
  <div id="chat-status" class="status-bar" style="display:none"><span class="spinner"></span><span>Claude is thinking…</span></div>
  <div class="input-bar">
    <input id="chat-input" placeholder="Message PAN..." onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">Send</button>
  </div>
</div>


<!-- PROJECTS -->
<div id="projects" class="page"></div>

<!-- SENSORS -->
<div id="sensors" class="page"></div>

<!-- DATA -->
<div id="data" class="page"></div>

<!-- SETTINGS -->
<div id="settings" class="page"></div>

<script>
const API = window.location.origin;
let projects = [];
let activeProject = null;
let chatPollTimer = null;
let lastSentTime = 0; // prevent auto-refresh from wiping sent messages

// NOTE: Previously overrode fetch to inject X-Device-Name/X-Device-Id headers,
// but that caused a duplicate "PAN-Mobile" ghost device. The Android app already
// registers the phone — the mobile web page is just a dashboard viewer.

// Tab switching
document.getElementById('tab-bar').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const name = tab.dataset.tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById(name).classList.add('active');
  loadTab(name);
});

function loadTab(name) {
  switch(name) {
    case 'chat': loadChat(); break;
    case 'projects': loadProjects(); break;
    case 'sensors': loadSensors(); break;
    case 'data': loadData(); break;
    case 'settings': loadSettings(); break;
  }
}

// Project change
function onProjectChange() {
  const sel = document.getElementById('project-select');
  const path = sel.value;
  activeProject = projects.find(p => p.path === path) || null;
  const active = document.querySelector('.page.active');
  if (active) loadTab(active.id);
}

// ========== APPROVALS BANNER ==========
// Polls /api/v1/terminal/permissions and shows a sticky banner when anything is pending.
// Visible on every tab. Also updates a red badge on the Chat tab.
let _lastApprovalIds = '';
async function pollApprovals() {
  try {
    const res = await fetch(API + '/api/v1/terminal/permissions');
    const data = await res.json();
    const perms = (data.permissions || []).filter(p => !p.response);
    const banner = document.getElementById('approvals-banner');
    const listEl = document.getElementById('approvals-list');
    const countEl = document.getElementById('approvals-count');
    const chatTab = document.querySelector('.tab[data-tab="chat"]');

    // Update chat tab badge
    if (chatTab) {
      const existingBadge = chatTab.querySelector('.badge');
      if (perms.length > 0) {
        if (!existingBadge) {
          chatTab.insertAdjacentHTML('beforeend', ' <span class="badge">' + perms.length + '</span>');
        } else {
          existingBadge.textContent = perms.length;
        }
      } else if (existingBadge) {
        existingBadge.remove();
      }
    }

    if (perms.length === 0) {
      banner.classList.remove('visible');
      _lastApprovalIds = '';
      return;
    }
    // Only re-render if the set of pending IDs changed
    const idSig = perms.map(p => p.id).join(',');
    if (idSig === _lastApprovalIds) return;
    _lastApprovalIds = idSig;

    countEl.textContent = perms.length;
    listEl.innerHTML = '';
    for (const p of perms) {
      const div = document.createElement('div');
      div.className = 'approvals-item';
      div.innerHTML =
        '<div class="prompt">' + esc((p.prompt || p.tool_name || 'unknown').slice(0, 300)) + '</div>' +
        '<div class="btns">' +
          '<button class="allow-btn">Allow</button>' +
          '<button class="deny-btn">Deny</button>' +
        '</div>';
      div.querySelector('.allow-btn').addEventListener('click', () => respondToApproval(p.id, 'allow'));
      div.querySelector('.deny-btn').addEventListener('click', () => respondToApproval(p.id, 'deny'));
      listEl.appendChild(div);
    }
    banner.classList.add('visible');
  } catch (e) {
    console.error('pollApprovals error:', e);
  }
}

async function respondToApproval(permId, response) {
  try {
    await fetch(API + '/api/v1/terminal/permissions/respond', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id: permId, response: response })
    });
    _lastApprovalIds = ''; // force re-render on next poll
    setTimeout(pollApprovals, 200);
  } catch (e) {
    console.error('respondToApproval failed:', e);
  }
}

// INIT
async function init() {
  console.log('init: fetching projects from ' + API);
  try {
    const res = await fetch(API + '/dashboard/api/projects');
    projects = await res.json();
    console.log('init: got ' + projects.length + ' projects');
    const sel = document.getElementById('project-select');
    projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.path;
      opt.textContent = p.name;
      sel.appendChild(opt);
    });
    const pan = projects.find(p => p.name === 'PAN');
    if (pan) { sel.value = pan.path; activeProject = pan; }
  } catch(e) { console.error('init error:', e); document.body.innerHTML += '<div style="color:red;padding:20px">INIT ERROR: '+e.message+'</div>'; }
  loadChat();
  // Auto-refresh active tab every 3 seconds
  setInterval(() => {
    const active = document.querySelector('.page.active');
    if (active) loadTab(active.id);
  }, 3000);
  // Poll approvals every 2 seconds — independent of active tab so the banner
  // appears no matter where the user is in the app
  pollApprovals();
  setInterval(pollApprovals, 2000);
}

// ========== CHAT / TERMINAL ==========
// Settings — same keys as desktop terminal
const PAN_USER = (localStorage.getItem('pan_username') || 'Tereseus').replace(/[^a-zA-Z0-9_-]/g, '');
const PAN_LLM = (localStorage.getItem('pan_llm_name') || 'Claude').replace(/[^a-zA-Z0-9_-]/g, '');
function firstCap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
const USERNAME = firstCap(PAN_USER);
const LLMNAME = firstCap(PAN_LLM);

let _renderedMsgIds = []; // append-only render: track which msgs have been rendered
function renderMsgLine(msg) {
  const role = msg.role || '';
  const type = msg.type || '';
  const text = msg.text || '';
  if (!text || text.length < 1) return null;
  // Filter out the "ΠΑΝ remembers" trigger
  if (role === 'user' && /^ΠΑΝ remembers/i.test(text.trim())) return null;
  if (role === 'user' && type === 'prompt') {
    return '<div class="t-line t-user"><span class="name">' + esc(USERNAME) + '</span><span class="sep">$ </span>' + esc(text) + '</div>';
  }
  if (role === 'assistant' && type === 'text') {
    return '<div class="t-line t-assistant"><span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>' + esc(text) + '</div>';
  }
  if (role === 'assistant' && type === 'tool') {
    return '<div class="t-line t-tool"><span class="arrow">→ </span>' + esc(text) + '</div>';
  }
  return null;
}

async function loadChat() {
  const el = document.getElementById('chat-msgs');
  // Don't refresh if user sent a message in the last 5 seconds
  if (Date.now() - lastSentTime < 5000) return;
  try {
    if (activeProject) {
      const probeRes = await fetch(API + '/dashboard/api/events?limit=10&project_path=' + encodeURIComponent(activeProject.path));
      const probeData = await probeRes.json();
      const events = probeData.events || [];
      // Collect up to 3 unique non-system session IDs
      const sids = [];
      const seen = new Set();
      for (const e of events) {
        const sid = e.session_id || '';
        if (sid && !seen.has(sid) && !/^(system|phone|router|dash|mob|dev-dash)-/.test(sid)) {
          seen.add(sid);
          sids.push(sid);
          if (sids.length >= 3) break;
        }
      }
      if (sids.length) {
        const all = [];
        await Promise.all(sids.map(async (sid) => {
          const tRes = await fetch(API + '/dashboard/api/transcript?session_id=' + encodeURIComponent(sid) + '&limit=200');
          const tData = await tRes.json();
          if (tData.messages) all.push(...tData.messages);
        }));
        all.sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));
        if (all.length) {
          // Append-only: only add lines we haven't rendered yet (preserve scroll position)
          if (_renderedMsgIds.length === 0) el.innerHTML = '';
          const existingCount = _renderedMsgIds.length;
          if (all.length < existingCount) {
            // transcript shrunk — full reset
            el.innerHTML = '';
            _renderedMsgIds = [];
          }
          const wasNearBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < 80;
          let added = 0;
          for (let i = _renderedMsgIds.length; i < all.length; i++) {
            const html = renderMsgLine(all[i]);
            if (html) { el.insertAdjacentHTML('beforeend', html); added++; }
            _renderedMsgIds.push(1);
          }
          if (added > 0 && wasNearBottom) el.scrollTop = el.scrollHeight;
          return;
        }
      }
    }
    // Fallback: show events if no transcript
    if (_renderedMsgIds.length > 0) return; // don't wipe an already-loaded transcript
    let url = API + '/dashboard/api/events?limit=30&type=RouterCommand';
    const res = await fetch(url);
    const data = await res.json();
    const events = (data.events || []).reverse();
    if (!events.length) { el.innerHTML = '<div class="muted">No conversations yet</div>'; return; }
    el.innerHTML = '';
    for (const e of events) {
      try {
        const d = JSON.parse(e.data);
        const text = d.text || d.query || '';
        const resp = d.result || d.response || '';
        if (text) el.innerHTML += '<div class="t-line t-user"><span class="name">' + esc(USERNAME) + '</span><span class="sep">$ </span>' + esc(text.slice(0,500)) + '</div>';
        if (resp && resp !== '[AMBIENT]') el.innerHTML += '<div class="t-line t-assistant"><span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>' + esc(resp.slice(0,500)) + '</div>';
      } catch {}
    }
    el.scrollTop = el.scrollHeight;
  } catch(e) { el.innerHTML = '<div class="muted">Error: '+e.message+'</div>'; }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  lastSentTime = Date.now();
  const el = document.getElementById('chat-msgs');
  const status = document.getElementById('chat-status');
  // Optimistic local echo as a terminal user line + faded pending placeholder
  el.insertAdjacentHTML('beforeend', '<div class="t-line t-user"><span class="name">' + esc(USERNAME) + '</span><span class="sep">$ </span>' + esc(text) + '</div>');
  el.insertAdjacentHTML('beforeend', '<div class="t-line t-assistant t-pending" id="chat-typing"><span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>thinking…</div>');
  el.scrollTop = el.scrollHeight;
  if (status) status.style.display = 'flex';

  const sessionId = activeProject ? 'dash-' + activeProject.name.toLowerCase().replace(/\s+/g, '-') : 'dash-pan';
  try {
    const res = await fetch(API + '/api/v1/terminal/send', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text: text, session_id: sessionId })
    });
    const data = await res.json();
    if (!data.ok) {
      const t = document.getElementById('chat-typing');
      if (t) { t.innerHTML = '<span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>send failed: ' + esc(data.error || ''); t.style.color = 'var(--red)'; t.removeAttribute('id'); }
      if (status) status.style.display = 'none';
      return;
    }
    // Poll transcript for Claude's response
    let prevCount = _renderedMsgIds.length;
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 2000));
      lastSentTime = Date.now(); // keep blocking auto-refresh
      await loadChat();
      if (_renderedMsgIds.length > prevCount + 1) {
        const t = document.getElementById('chat-typing');
        if (t) t.remove();
        break;
      }
    }
    const t = document.getElementById('chat-typing');
    if (t) { t.innerHTML = '<span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>still processing…'; t.removeAttribute('id'); }
  } catch(e) {
    const t = document.getElementById('chat-typing');
    if (t) { t.innerHTML = '<span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>error: ' + esc(e.message); t.style.color = 'var(--red)'; t.removeAttribute('id'); }
  }
  if (status) status.style.display = 'none';
  lastSentTime = 0;
  el.scrollTop = el.scrollHeight;
}

// Direct DB queries — don't waste Cerebras tokens on simple lookups
function tryDirectQuery(text) {
  const lower = text.toLowerCase();
  if (lower.match(/how many (events|sessions|projects|devices|memories)/)) {
    return fetch(API + '/dashboard/api/stats').then(r=>r.json()).then(s => {
      return 'Stats: ' + s.total_events + ' events, ' + s.total_sessions + ' sessions, ' + s.total_projects + ' projects, ' + s.total_devices + ' devices, ' + s.total_memory + ' memories. DB: ' + (s.db_size_bytes/1048576).toFixed(1) + ' MB';
    });
  }
  if (lower.match(/show.*events|recent events|latest events|what happened/)) {
    return fetch(API + '/dashboard/api/events?limit=5').then(r=>r.json()).then(d => {
      return (d.events||[]).map(e => {
        const dd = JSON.parse(e.data);
        return e.event_type + ': ' + (dd.text||dd.response||'').slice(0,60);
      }).join('\n') || 'No events';
    });
  }
  if (lower.match(/show.*projects|list projects|my projects/)) {
    return fetch(API + '/dashboard/api/projects').then(r=>r.json()).then(ps => {
      return ps.map(p => p.name + ' — ' + (p.description||p.path)).join('\n');
    });
  }
  if (lower.match(/show.*tasks|how many tasks|task progress|project progress/)) {
    const pid = activeProject?.id || 2;
    return fetch(API + '/dashboard/api/projects/' + pid + '/tasks').then(r=>r.json()).then(d => {
      const ms = d.milestones || [];
      let total=0, done=0;
      ms.forEach(m => { const t=m.tasks||[]; total+=t.length; done+=t.filter(x=>x.status==='done').length; });
      const pct = total ? Math.round(done/total*100) : 0;
      return (activeProject?.name||'PAN') + ': ' + done + '/' + total + ' tasks done (' + pct + '%)\n' +
        ms.map(m => { const t=m.tasks||[]; const d=t.filter(x=>x.status==='done').length; return '  ' + m.name + ': ' + d + '/' + t.length; }).join('\n');
    });
  }
  if (lower.match(/show.*devices|list devices|my devices/)) {
    return fetch(API + '/api/v1/devices/list').then(r=>r.json()).then(ds => {
      return ds.map(d => (d.name||d.device_id) + ' (ID:' + d.id + ')').join('\n') || 'No devices';
    });
  }
  if (lower.match(/status|health|uptime/)) {
    return fetch(API + '/health').then(r=>r.json()).then(h => {
      return 'PAN Hub: ' + h.status + ', uptime: ' + (h.uptime||'?');
    });
  }
  return null;
}



// ========== PROJECTS ==========
async function loadProjects() {
  const el = document.getElementById('projects');
  try {
    const pid = activeProject?.id || 2;
    const [projRes, tasksRes] = await Promise.all([
      fetch(API + '/dashboard/api/projects'),
      fetch(API + '/dashboard/api/projects/' + pid + '/tasks')
    ]);
    const projs = await projRes.json();
    const tasksData = await tasksRes.json();
    const milestones = tasksData.milestones || [];
    const uncategorized = tasksData.uncategorized || [];

    // Overall progress
    let totalDone = 0, totalAll = 0;
    for (const m of milestones) {
      const tasks = m.tasks || [];
      totalAll += tasks.length;
      totalDone += tasks.filter(t => t.status === 'done').length;
    }
    totalAll += uncategorized.length;
    totalDone += uncategorized.filter(t => t.status === 'done').length;
    const overallPct = totalAll > 0 ? Math.round(totalDone / totalAll * 100) : 0;

    let html = '';

    // Overall progress for active project
    html += '<div class="card" style="margin-top:8px"><h3>' + esc(activeProject?.name || 'PAN') + '</h3>';
    html += '<div style="display:flex;justify-content:space-between;margin:4px 0"><span style="font-size:13px">' + totalDone + '/' + totalAll + ' tasks done</span><span style="font-size:13px;color:var(--accent)">' + overallPct + '%</span></div>';
    html += '<div class="progress-bg"><div class="progress-fill" style="width:' + overallPct + '%"></div></div></div>';

    // Milestones
    for (const m of milestones) {
      const tasks = m.tasks || [];
      const done = tasks.filter(t => t.status === 'done').length;
      const total = tasks.length;
      const pct = total > 0 ? Math.round(done / total * 100) : 0;
      html += '<div class="milestone">';
      html += '<div class="milestone-header" onclick="this.parentElement.querySelector(\'.milestone-tasks\').classList.toggle(\'open\')">';
      html += '<span class="milestone-name">' + esc(m.name) + '</span>';
      html += '<span class="milestone-pct">' + done + '/' + total + ' (' + pct + '%)</span>';
      html += '</div>';
      html += '<div class="progress-bg" style="margin:0 12px"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
      html += '<div class="milestone-tasks">';
      for (const t of tasks) {
        const icon = t.status === 'done' ? '<span class="task-check">✓</span>' : '<span class="task-open">○</span>';
        html += '<div class="task-row">' + icon + ' ' + esc(t.title) + '</div>';
      }
      html += '</div></div>';
    }

    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="muted">Error: '+e.message+'</div>'; }
}

// ========== SENSORS ==========
async function loadSensors() {
  const el = document.getElementById('sensors');
  try {
    const res = await fetch(API + '/api/v1/devices/list');
    const devices = await res.json();
    let html = '';
    for (const dev of devices) {
      const devName = dev.name || dev.device_name || dev.device_id || 'Device ' + dev.id;
      html += '<div class="sensor-device"><h3>' + esc(devName) + '</h3>';
      try {
        const sRes = await fetch(API + '/api/sensors/devices/' + dev.id);
        const sData = await sRes.json();
        const assignments = sData.assignments || sData || [];
        const arr = Array.isArray(assignments) ? assignments : (assignments.sensors || []);
        if (arr.length) {
          for (const s of arr) {
            const key = s.sensor_key || s.key || s.name || 'unknown';
            const sid = s.id || 0;
            const enabled = s.enabled ? true : false;
            const val = s.latest_value != null ? s.latest_value : '';
            html += '<div class="sensor-row"><span class="sensor-name">' + esc(key);
            if (val) html += ' <span style="font-size:11px;color:var(--text2)">' + esc(String(val)) + '</span>';
            html += '</span>';
            html += '<label style="position:relative;display:inline-block;width:44px;height:24px;cursor:pointer">';
            html += '<input type="checkbox" ' + (enabled ? 'checked' : '') + ' onchange="toggleSensor(' + dev.id + ',\'' + esc(key) + '\',this.checked,' + sid + ')" style="opacity:0;width:0;height:0">';
            html += '<span style="position:absolute;inset:0;background:' + (enabled ? 'var(--accent)' : 'var(--bg3)') + ';border-radius:12px;transition:0.2s"></span>';
            html += '<span style="position:absolute;top:2px;left:' + (enabled ? '22px' : '2px') + ';width:20px;height:20px;background:#fff;border-radius:50%;transition:0.2s"></span>';
            html += '</label></div>';
          }
        } else {
          html += '<div class="muted" style="padding:8px">No sensors assigned</div>';
        }
      } catch(e) { html += '<div class="muted" style="padding:8px">Sensors: ' + e.message + '</div>'; }
      html += '</div>';
    }
    el.innerHTML = html || '<div class="muted">No devices found</div>';
  } catch(e) { el.innerHTML = '<div class="muted">Error: '+e.message+'</div>'; }
}

// ========== DATA ==========
async function loadData() {
  const el = document.getElementById('data');
  try {
    const [statsRes, eventsRes] = await Promise.all([
      fetch(API + '/dashboard/api/stats'),
      fetch(API + '/dashboard/api/events?limit=20')
    ]);
    const stats = await statsRes.json();
    const events = await eventsRes.json();

    let html = '<div class="stat-grid">';
    html += '<div class="stat-card"><div class="stat-val">' + (stats.total_events||0).toLocaleString() + '</div><div class="stat-label">Events</div></div>';
    html += '<div class="stat-card"><div class="stat-val">' + (stats.total_sessions||0) + '</div><div class="stat-label">Sessions</div></div>';
    html += '<div class="stat-card"><div class="stat-val">' + (stats.total_projects||0) + '</div><div class="stat-label">Projects</div></div>';
    html += '<div class="stat-card"><div class="stat-val">' + (stats.total_devices||0) + '</div><div class="stat-label">Devices</div></div>';
    html += '<div class="stat-card"><div class="stat-val">' + (stats.total_memory||0).toLocaleString() + '</div><div class="stat-label">Memories</div></div>';
    const dbMb = stats.db_size_bytes ? (stats.db_size_bytes / 1048576).toFixed(1) + ' MB' : '—';
    html += '<div class="stat-card"><div class="stat-val">' + dbMb + '</div><div class="stat-label">DB Size</div></div>';
    html += '</div>';

    // Event type breakdown
    if (stats.event_types) {
      html += '<div class="section-title">Event Types</div>';
      for (const et of stats.event_types.slice(0, 10)) {
        html += '<div class="event-row"><span class="event-type">' + esc(et.event_type) + '</span><span>' + et.count + '</span></div>';
      }
    }

    // Recent events
    html += '<div class="section-title">Recent Events</div>';
    for (const e of (events.events || [])) {
      let preview = '';
      try { const d = JSON.parse(e.data); preview = (d.text || d.response || d.transcript || '').slice(0, 80); } catch {}
      html += '<div class="event-row"><div><span class="event-type">' + esc(e.event_type) + '</span>';
      if (preview) html += '<div class="event-text">' + esc(preview) + '</div>';
      html += '</div><span class="event-time">' + (e.created_at?.slice(11,16)||'') + '</span></div>';
    }

    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="muted">Error: '+e.message+'</div>'; }
}

async function toggleSensor(deviceId, sensorKey, enabled, assignmentId) {
  try {
    await fetch(API + '/api/sensors/devices/' + deviceId + '/' + sensorKey, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ enabled: enabled })
    });
    setTimeout(loadSensors, 500);
  } catch(e) { console.error('Toggle failed:', e); }
}


// ========== SETTINGS ==========
async function loadSettings() {
  const el = document.getElementById('settings');
  let html = '';

  // Connection
  html += '<div class="section-title">Connection</div><div class="card">';
  try {
    const res = await fetch(API + '/health');
    const h = await res.json();
    html += '<div class="setting-row"><span class="setting-label">PAN Hub</span><span class="setting-val" style="color:var(--green)">' + h.status + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Uptime</span><span class="setting-val">' + (h.uptime||'—') + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Proxy</span><span class="setting-val">' + API + '</span></div>';
    if (h.tailscaleIp) html += '<div class="setting-row"><span class="setting-label">Tailscale IP</span><span class="setting-val">' + h.tailscaleIp + '</span></div>';
  } catch(e) {
    html += '<div class="setting-row"><span class="setting-label">Status</span><span class="setting-val" style="color:var(--red)">Disconnected</span></div>';
  }
  html += '</div>';

  // AI
  html += '<div class="section-title">AI</div><div class="card">';
  try {
    const res = await fetch(API + '/api/v1/auth/providers');
    const auth = await res.json();
    html += '<div class="setting-row"><span class="setting-label">Auth Mode</span><span class="setting-val">' + (auth.auth_mode||'none') + '</span></div>';
  } catch {}
  html += '<div class="setting-row"><span class="setting-label">Backend</span><span class="setting-val">Cerebras</span></div>';
  html += '<div class="setting-row"><span class="setting-label">Model</span><span class="setting-val">Qwen 3 235B</span></div>';
  html += '<div class="setting-row"><span class="setting-label">Speed</span><span class="setting-val">~580ms</span></div>';
  html += '<div class="setting-row"><span class="setting-label">Free Tier</span><span class="setting-val">1M tokens/day</span></div>';
  html += '</div>';

  // Devices
  html += '<div class="section-title">Devices</div><div class="card">';
  try {
    const res = await fetch(API + '/api/v1/devices/list');
    const devs = await res.json();
    for (const d of devs) {
      const name = d.name || d.device_name || d.device_id || 'Device';
      html += '<div class="setting-row"><span class="setting-label">' + esc(name) + '</span><span class="setting-val">' + (d.last_seen ? 'Online' : '—') + '</span></div>';
    }
  } catch {}
  html += '</div>';

  // Phone
  html += '<div class="section-title">This Device</div><div class="card">';
  html += '<div class="setting-row"><span class="setting-label">Platform</span><span class="setting-val">' + (navigator.userAgent.match(/Android[^;]*/)?.[0] || 'Android') + '</span></div>';
  html += '<div class="setting-row"><span class="setting-label">Screen</span><span class="setting-val">' + screen.width + 'x' + screen.height + '</span></div>';
  html += '<div class="setting-row"><span class="setting-label">WebView</span><span class="setting-val">' + (navigator.userAgent.match(/Chrome\/[\d.]+/)?.[0] || '?') + '</span></div>';
  html += '</div>';

  el.innerHTML = html;
}


function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

document.title = 'PAN v3.' + Date.now();
console.log('PAN Mobile v3 loaded at ' + new Date().toISOString());
