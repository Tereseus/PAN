<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="/v2/pan-telemetry.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>PAN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#0a0a0f; --bg2:#1e1e2e; --bg3:#313244; --text:#cdd6f4; --text2:#6c7086; --accent:#89b4fa; --green:#a6e3a1; --red:#f38ba8; --border:#313244; --radius:8px; }
body { background:#0a0a0f; color:#cdd6f4; font-family:-apple-system,system-ui,sans-serif; font-size:14px; height:100vh; height:100dvh; overscroll-behavior-y:contain; }

/* Top bar — fixed so it never scrolls away */
.topbar { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); background:var(--bg); position:fixed; top:0; left:0; right:0; z-index:30; height:42px; }
.topbar h1 { font-size:16px; color:var(--accent); white-space:nowrap; }
.topbar select { flex:1; background:var(--bg2); color:var(--text); border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px; font-size:13px; }

/* Tabs — fixed below topbar */
.tabs { display:flex; border-bottom:1px solid var(--border); overflow-x:auto; background:var(--bg); position:fixed; top:42px; left:0; right:0; z-index:29; }
.tabs::-webkit-scrollbar { display:none; }

/* Content spacer — push page content below fixed topbar+tabs */
.content-spacer { height:80px; }
.tab { padding:10px 14px; color:var(--text2); cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; font-size:13px; font-weight:500; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* Pages */
.page { display:none; }
.page.active { display:block; }

/* Terminal-style chat — matches desktop terminal renderer */
.messages { display:flex; flex-direction:column; padding:8px 10px 56px; min-height:200px; background:#11111b; font-family:"JetBrains Mono","Cascadia Code",Consolas,monospace; font-size:13px; line-height:1.4; }
.t-line { padding:6px 8px; margin:0; word-break:break-word; white-space:pre-wrap; border-radius:6px; }
.t-user { margin-top:8px; color:#cdd6f4; background:#1e1e2e; border-left:3px solid #a6e3a1; }
.t-user .name { color:#a6e3a1; font-weight:bold; }
.t-user .sep { color:#89b4fa; }
.t-assistant { margin-top:4px; color:#bac2de; background:#181825; border-left:3px solid #cba6f7; }
.t-assistant .name { color:#cba6f7; font-weight:bold; }
.t-assistant .sep { color:#89b4fa; }
.t-tool { color:#f9e2af; padding-left:10px; background:#1a1a28; border-left:3px solid #f9e2af; margin-top:2px; }
.t-tool .arrow { color:#6c7086; }
.t-pending { opacity:0.5; font-style:italic; }
/* Alert severity badges */
.alert-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; margin:6px 12px; }
.alert-card.sev-critical { border-left:3px solid var(--red); }
.alert-card.sev-warning { border-left:3px solid #f9e2af; }
.alert-card.sev-info { border-left:3px solid var(--accent); }
.alert-title { font-size:13px; font-weight:600; margin-bottom:4px; }
.alert-meta { font-size:11px; color:var(--text2); display:flex; justify-content:space-between; margin-bottom:4px; }
.alert-detail { font-size:12px; color:var(--text2); margin-top:4px; word-break:break-word; }
.alert-actions { display:flex; gap:6px; margin-top:8px; }
.alert-actions button { flex:1; border:none; border-radius:4px; padding:8px; font-size:12px; font-weight:600; cursor:pointer; }
.alert-ack { background:#f9e2af; color:#1e1e2e; }
.alert-dismiss { background:var(--bg3); color:var(--text2); }
.status-bar { display:flex; align-items:center; gap:8px; padding:5px 10px; background:#181825; border-top:1px solid #313244; font-size:12px; color:#cba6f7; }
.spinner { display:inline-block; width:10px; height:10px; border:2px solid #313244; border-top-color:#cba6f7; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Approvals banner — sticky at top, visible on every tab */
.approvals-banner { position:fixed; top:80px; left:0; right:0; z-index:28; background:#f9e2af; color:#1e1e2e; padding:10px 12px; border-top:1px solid #d4a72c; border-bottom:1px solid #d4a72c; display:none; }
.approvals-banner.visible { display:block; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{background:#f9e2af} 50%{background:#fab387} }
.approvals-banner .hdr { font-weight:700; font-size:13px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.approvals-banner .hdr .count { background:#1e1e2e; color:#f9e2af; border-radius:10px; padding:1px 8px; font-size:11px; }
.approvals-item { background:#fff; border-radius:6px; padding:8px 10px; margin-top:6px; }
.approvals-item .prompt { font-size:12px; color:#1e1e2e; word-break:break-word; margin-bottom:6px; max-height:60px; overflow:hidden; text-overflow:ellipsis; }
.approvals-item .btns { display:flex; gap:6px; }
.approvals-item button { flex:1; border:none; border-radius:4px; padding:8px; font-size:13px; font-weight:600; cursor:pointer; }
.approvals-item .allow-btn { background:#a6e3a1; color:#1e1e2e; }
.approvals-item .deny-btn { background:#f38ba8; color:#1e1e2e; }
.tab .badge { display:inline-block; background:#f38ba8; color:#1e1e2e; border-radius:10px; padding:1px 6px; font-size:10px; font-weight:700; margin-left:4px; }
.input-bar { display:flex; align-items:center; gap:6px; padding:6px 10px; border-top:1px solid var(--border); background:var(--bg); position:fixed; bottom:0; left:0; right:0; z-index:25; transition:bottom 0.15s; }
.input-bar select { background:var(--bg2); color:var(--text); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; font-size:16px; max-width:120px; height:44px; }
.input-bar textarea { flex:1; background:var(--bg2); color:var(--text); border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px; font-size:14px; outline:none; font-family:inherit; resize:none; height:36px; max-height:80px; line-height:1.3; overflow-y:auto; }
.input-bar button { background:var(--accent); color:#000; border:none; border-radius:var(--radius); padding:8px 14px; font-weight:600; font-size:14px; }
/* Alert items on mobile */
.alert-item { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; margin:6px 12px; }
.alert-item.critical { border-color:var(--red); }
.alert-item.warning { border-color:#f9e2af; }
.alert-title { font-size:13px; font-weight:600; margin-bottom:4px; }
.alert-detail { font-size:12px; color:var(--text2); margin-bottom:6px; word-break:break-word; }
.alert-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--text2); }
.alert-actions { display:flex; gap:6px; margin-top:6px; }
.alert-actions button { flex:1; border:none; border-radius:4px; padding:6px; font-size:12px; font-weight:600; cursor:pointer; }
.alert-ack-btn { background:#f9e2af; color:#1e1e2e; }
.alert-dismiss-btn { background:var(--bg3); color:var(--text2); }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin:6px 12px; }
.card h3 { font-size:14px; margin-bottom:6px; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:12px; text-align:center; }
.stat-val { font-size:22px; font-weight:700; color:var(--accent); }
.stat-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

/* Progress */
.progress-bg { background:var(--bg3); border-radius:4px; height:6px; overflow:hidden; margin:4px 0; }
.progress-fill { background:var(--accent); height:100%; border-radius:4px; transition:width 0.3s; }

/* Milestone */
.milestone { margin:6px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.milestone-header { padding:10px 12px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
.milestone-header:active { background:var(--bg3); }
.milestone-name { font-size:13px; font-weight:600; }
.milestone-pct { font-size:12px; color:var(--accent); font-weight:600; }
.milestone-tasks { display:none; padding:0 12px 10px; }
.milestone-tasks.open { display:block; }
.task-row { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; border-bottom:1px solid var(--bg3); }
.task-row:last-child { border:none; }
.task-check { color:var(--green); }
.task-open { color:var(--text2); }

/* Events */
.event-row { display:flex; justify-content:space-between; padding:8px 12px; border-bottom:1px solid var(--bg3); font-size:13px; }
.event-type { color:var(--accent); font-weight:500; }
.event-time { color:var(--text2); font-size:11px; }
.event-text { color:var(--text); font-size:12px; margin-top:2px; }

/* Sensors */
.sensor-device { margin:6px 12px; }
.sensor-device h3 { padding:8px 0; font-size:14px; }
.sensor-row { display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:4px; }
.sensor-name { font-size:13px; }
.sensor-val { font-size:13px; color:var(--accent); }

/* Settings */
.setting-row { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--bg3); }
.setting-label { font-size:13px; }
.setting-val { font-size:13px; color:var(--accent); max-width:60%; text-align:right; word-break:break-all; }

.muted { color:var(--text2); text-align:center; padding:30px 20px; font-size:14px; }
.section-title { font-size:13px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; padding:12px 12px 4px; }

/* Alert cards */
.alert-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; margin:6px 12px; }
.alert-card.sev-critical { border-left:3px solid var(--red); }
.alert-card.sev-warning { border-left:3px solid #f9e2af; }
.alert-card.sev-info { border-left:3px solid var(--accent); }
.alert-sev { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.alert-sev.critical { color:var(--red); }
.alert-sev.warning { color:#f9e2af; }
.alert-sev.info { color:var(--accent); }
.alert-title { font-size:13px; font-weight:600; margin:4px 0; }
.alert-detail { font-size:12px; color:var(--text2); margin:4px 0 6px; word-break:break-word; }
.alert-time { font-size:11px; color:var(--text2); }
.alert-actions { display:flex; gap:6px; margin-top:6px; }
.alert-actions button { flex:1; border:none; border-radius:4px; padding:6px; font-size:12px; font-weight:600; cursor:pointer; }
.alert-ack { background:var(--bg3); color:var(--text); }
.alert-resolve { background:var(--green); color:#1e1e2e; }
.alert-dismiss { background:var(--bg3); color:var(--text2); }
.alert-filter-bar { display:flex; gap:6px; padding:8px 12px; overflow-x:auto; }
.alert-filter-bar button { background:var(--bg2); color:var(--text2); border:1px solid var(--border); border-radius:var(--radius); padding:6px 12px; font-size:12px; white-space:nowrap; }
.alert-filter-bar button.active { background:var(--accent); color:#1e1e2e; border-color:var(--accent); }

/* Org indicator in top bar */
.org-indicator { display:flex; align-items:center; gap:4px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:4px 8px; font-size:12px; color:var(--text); cursor:pointer; white-space:nowrap; -webkit-user-select:none; user-select:none; }
.org-indicator:active { background:var(--bg3); }
.org-indicator .org-lock { font-size:11px; margin-left:2px; }
.org-indicator .org-name { color:var(--accent); font-weight:500; }

/* Org switcher modal */
.org-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; }
.org-modal-overlay.visible { display:flex; }
.org-modal { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; width:85%; max-width:320px; max-height:70vh; overflow-y:auto; }
.org-modal h3 { font-size:15px; color:var(--accent); margin-bottom:12px; }
.org-modal-item { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:6px; cursor:pointer; }
.org-modal-item:active { background:var(--bg3); }
.org-modal-item.active { border-color:var(--accent); background:rgba(137,180,250,0.1); }
.org-modal-item .org-item-name { font-size:14px; font-weight:500; }
.org-modal-item .org-item-role { font-size:11px; color:var(--text2); }
.org-modal-close { display:block; width:100%; margin-top:8px; padding:10px; background:var(--bg3); color:var(--text); border:none; border-radius:var(--radius); font-size:14px; cursor:pointer; }

/* Incognito toggle button */
.incognito-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--radius); border:1px solid var(--border); font-size:13px; font-weight:500; cursor:pointer; }
.incognito-btn.off { background:var(--bg3); color:var(--text); }
.incognito-btn.on { background:var(--accent); color:#000; }
</style>
</head>
<body>

<!-- Top bar with org name + project selector -->
<div class="topbar" id="topbar">
  <h1 id="topbar-title" onclick="showOrgSwitcher()" style="cursor:pointer">Π</h1>
  <button id="refresh-btn" onclick="refreshCurrentTab()" style="background:none;border:none;color:var(--accent);padding:0 4px;font-size:18px;cursor:pointer;line-height:1">↻</button>
  <select id="project-select" onchange="onProjectChange()" style="flex:1">
    <option value="">Select project...</option>
  </select>
</div>

<!-- Org switcher modal -->
<div class="org-modal-overlay" id="org-modal" onclick="if(event.target===this)hideOrgSwitcher()">
  <div class="org-modal">
    <h3>Organizations</h3>
    <div id="org-modal-list"><div class="muted">Loading...</div></div>
    <button class="org-modal-close" onclick="hideOrgSwitcher()">Close</button>
  </div>
</div>

<!-- Tabs — same widget names as desktop -->
<div class="tabs" id="tab-bar">
  <div class="tab active" data-tab="chat">Chat</div>
  <div class="tab" data-tab="status">Usage</div>
  <div class="tab" data-tab="alerts">Alerts</div>
  <div class="tab" data-tab="tasks">Tasks</div>
  <div class="tab" data-tab="devices">Devices</div>
  <div class="tab" data-tab="services">Services</div>
  <div class="tab" data-tab="library">Library</div>
  <div class="tab" data-tab="projects">Projects</div>
  <div class="tab" data-tab="sensors">Sensors</div>
  <div class="tab" data-tab="data">Data</div>
  <div class="tab" data-tab="settings">Settings</div>
</div>

<!-- Spacer for fixed topbar+tabs -->
<div class="content-spacer"></div>

<!-- Approvals banner — sticky, visible on every tab when something is pending -->
<div id="approvals-banner" class="approvals-banner">
  <div class="hdr">⚠ Pending approval <span class="count" id="approvals-count">0</span></div>
  <div id="approvals-list"></div>
</div>

<!-- CHAT / TERMINAL — terminal-style transcript + input -->
<div id="chat" class="page active">
  <div class="messages" id="chat-msgs"><div class="muted">Loading conversations...</div></div>
  <div id="chat-status" class="status-bar" style="display:none"><span class="spinner"></span><span>Claude is thinking…</span></div>
  <div class="input-bar" id="input-bar">
    <select id="model-select" onchange="onModelChange()" title="Switch AI model">
      <option value="">default</option>
      <option value="claude-sonnet-4-5">sonnet-4-5</option>
      <option value="claude-sonnet-4-6">sonnet-4-6</option>
      <option value="claude-opus-4-6">opus-4-6</option>
      <option value="claude-haiku-4-5-20251001">haiku-4-5</option>
      <option value="cerebras:qwen-3-235b">qwen-235b</option>
    </select>
    <textarea id="chat-input" rows="1" placeholder="Message PAN..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}" oninput="autoGrowTextarea(this)"></textarea>
    <input type="file" id="screenshot-input" accept="image/*" capture="environment" style="display:none" onchange="uploadScreenshot(this)">
    <button onclick="document.getElementById('screenshot-input').click()" style="background:var(--bg2);color:var(--text2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:16px;align-self:flex-end" title="Share screenshot">&#128247;</button>
    <button onclick="sendChat()">Send</button>
  </div>
</div>


<!-- Widget pages — match desktop widget names -->
<div id="status" class="page"></div>
<div id="alerts" class="page"></div>
<div id="tasks" class="page"></div>
<div id="devices" class="page"></div>
<div id="services" class="page"></div>
<div id="library" class="page"></div>
<div id="projects" class="page"></div>
<div id="sensors" class="page"></div>
<div id="data" class="page"></div>
<div id="settings" class="page"></div>

<script>
const API = window.location.origin;
let projects = [];
let activeProject = null;
let chatPollTimer = null;
let lastSentTime = 0; // prevent auto-refresh from wiping sent messages

// NOTE: Previously overrode fetch to inject X-Device-Name/X-Device-Id headers,
// but that caused a duplicate "PAN-Mobile" ghost device. The Android app already
// registers the phone — the mobile web page is just a dashboard viewer.

// Tab switching
document.getElementById('tab-bar').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const name = tab.dataset.tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById(name).classList.add('active');
  loadTab(name);
});

let statusPollTimer = null;
function loadTab(name) {
  // Stop status polling when leaving status tab
  if (name !== 'status' && statusPollTimer) { clearInterval(statusPollTimer); statusPollTimer = null; }
  switch(name) {
    case 'chat': loadChat(); break;
    case 'status': loadStatus(); if (!statusPollTimer) statusPollTimer = setInterval(loadStatus, 30000); break;
    case 'alerts': loadAlerts(); break;
    case 'tasks': loadTasks(); break;
    case 'devices': loadDevices(); break;
    case 'services': loadServices(); break;
    case 'library': loadLibrary_m(); break;
    case 'projects': loadProjects(); break;
    case 'sensors': loadSensors(); break;
    case 'data': loadData(); break;
    case 'settings': loadSettings(); break;
  }
}

// Project change
function onProjectChange() {
  const sel = document.getElementById('project-select');
  const path = sel.value;
  activeProject = projects.find(p => p.path === path) || null;
  const active = document.querySelector('.page.active');
  if (active) loadTab(active.id);
}

// Model change
async function onModelChange() {
  const sel = document.getElementById('model-select');
  const model = sel.value;
  console.log('[PAN Mobile] changing model to:', model);

  // Find active session
  let sessionId = activeProject ? 'dash-' + activeProject.name.toLowerCase().replace(/\s+/g, '-') : 'dash-pan';
  try {
    const sessRes = await fetch(API + '/api/v1/terminal/sessions');
    const sessData = await sessRes.json();
    const sessions = sessData.sessions || [];
    const match = sessions.find(s => s.id.startsWith(sessionId)) || sessions[0];
    if (match) sessionId = match.id;
  } catch(err) { console.error('[PAN Mobile] session lookup failed:', err); }

  try {
    // 1. Set model on active session
    const setRes = await fetch(API + '/api/v1/terminal/set-model', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: sessionId, model: model })
    });
    const setData = await setRes.json();
    console.log('[PAN Mobile] set-model response:', setData);

    // 2. Save as default for future sessions
    const saveRes = await fetch(API + '/api/v1/settings', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ terminal_ai_model: model })
    });
    const saveData = await saveRes.json();
    console.log('[PAN Mobile] save settings response:', saveData);
  } catch(err) {
    console.error('[PAN Mobile] model change failed:', err);
  }
}

// Load current model setting
async function loadCurrentModel() {
  try {
    const res = await fetch(API + '/api/v1/settings');
    const settings = await res.json();
    const model = settings.terminal_ai_model || '';
    const sel = document.getElementById('model-select');
    if (sel) sel.value = model;
    console.log('[PAN Mobile] loaded current model:', model);
  } catch(err) {
    console.error('[PAN Mobile] failed to load model setting:', err);
  }
}

// ========== APPROVALS BANNER ==========
// Polls /api/v1/terminal/permissions and shows a sticky banner when anything is pending.
// Visible on every tab. Also updates a red badge on the Chat tab.
let _lastApprovalIds = '';
async function pollApprovals() {
  try {
    const res = await fetch(API + '/api/v1/terminal/permissions');
    const data = await res.json();
    const perms = (data.permissions || []).filter(p => !p.response);
    const banner = document.getElementById('approvals-banner');
    const listEl = document.getElementById('approvals-list');
    const countEl = document.getElementById('approvals-count');
    const chatTab = document.querySelector('.tab[data-tab="chat"]');

    // Update chat tab badge
    if (chatTab) {
      const existingBadge = chatTab.querySelector('.badge');
      if (perms.length > 0) {
        if (!existingBadge) {
          chatTab.insertAdjacentHTML('beforeend', ' <span class="badge">' + perms.length + '</span>');
        } else {
          existingBadge.textContent = perms.length;
        }
      } else if (existingBadge) {
        existingBadge.remove();
      }
    }

    if (perms.length === 0) {
      banner.classList.remove('visible');
      _lastApprovalIds = '';
      return;
    }
    // Only re-render if the set of pending IDs changed
    const idSig = perms.map(p => p.id).join(',');
    if (idSig === _lastApprovalIds) return;
    _lastApprovalIds = idSig;

    countEl.textContent = perms.length;
    listEl.innerHTML = '';
    for (const p of perms) {
      const div = document.createElement('div');
      div.className = 'approvals-item';
      div.innerHTML =
        '<div class="prompt">' + esc((p.prompt || p.tool_name || 'unknown').slice(0, 300)) + '</div>' +
        '<div class="btns">' +
          '<button class="allow-btn">Allow</button>' +
          '<button class="deny-btn">Deny</button>' +
        '</div>';
      div.querySelector('.allow-btn').addEventListener('click', () => respondToApproval(p.id, 'allow'));
      div.querySelector('.deny-btn').addEventListener('click', () => respondToApproval(p.id, 'deny'));
      listEl.appendChild(div);
    }
    banner.classList.add('visible');
  } catch (e) {
    console.error('pollApprovals error:', e);
  }
}

async function respondToApproval(permId, response) {
  try {
    await fetch(API + '/api/v1/terminal/permissions/respond', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id: permId, response: response })
    });
    _lastApprovalIds = ''; // force re-render on next poll
    setTimeout(pollApprovals, 200);
  } catch (e) {
    console.error('respondToApproval failed:', e);
  }
}

// Settings — same keys as desktop terminal
const PAN_USER = (localStorage.getItem('pan_username') || 'Tereseus').replace(/[^a-zA-Z0-9_-]/g, '');
const PAN_LLM = (localStorage.getItem('pan_llm_name') || 'Claude').replace(/[^a-zA-Z0-9_-]/g, '');
function firstCap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
const USERNAME = firstCap(PAN_USER);
const LLMNAME = firstCap(PAN_LLM);

let _renderedMsgIds = []; // append-only render: track which msgs have been rendered
let _lastFingerprint = ''; // detect content changes, not just count
function renderMsgLine(msg) {
  const role = msg.role || '';
  const type = msg.type || '';
  const text = msg.text || '';
  if (!text || text.length < 1) return null;
  // Filter out the "ΠΑΝ remembers" trigger
  if (role === 'user' && /^ΠΑΝ remembers/i.test(text.trim())) return null;
  if (role === 'user' && type === 'prompt') {
    return '<div class="t-line t-user"><span class="name">' + esc(USERNAME) + '</span><span class="sep">$ </span>' + esc(text) + '</div>';
  }
  if (role === 'assistant' && type === 'text') {
    return '<div class="t-line t-assistant"><span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>' + esc(text) + '</div>';
  }
  if (role === 'assistant' && type === 'tool') {
    return '<div class="t-line t-tool"><span class="arrow">→ </span>' + esc(text) + '</div>';
  }
  return null;
}

async function loadChat() {
  const el = document.getElementById('chat-msgs');
  // Don't auto-refresh if user sent a message in the last 5 seconds
  // (but allow explicit calls from the send polling loop via _forceLoad flag)
  if (!loadChat._forceLoad && Date.now() - lastSentTime < 5000) return;
  loadChat._forceLoad = false;
  try {
    // Primary: load from active terminal sessions (pipe mode — where Claude actually lives)
    const sessRes = await fetch(API + '/api/v1/terminal/sessions');
    const sessData = await sessRes.json();
    const sessions = sessData.sessions || [];
    const projectSlug = activeProject ? activeProject.name.toLowerCase().replace(/\s+/g, '-') : 'pan';
    const match = sessions.find(s => s.id.startsWith('dash-' + projectSlug)) || sessions[0];
    if (match) {
      const msgRes = await fetch(API + '/api/v1/terminal/messages/' + encodeURIComponent(match.id));
      const msgData = await msgRes.json();
      const all = (msgData.messages || []).filter(m => m.role === 'user' || m.role === 'assistant');
      // Only show last 50 messages to keep mobile snappy
      const recent = all.slice(-50);
      if (recent.length) {
        // Fingerprint detects ANY content change — not just count (which stays at 50 in sliding window)
        const fingerprint = recent.length + ':' + recent.map(m => (m.role||'') + (m.text||m.content||'').slice(0,40)).join('|');
        const fpChanged = fingerprint !== _lastFingerprint;
        console.log('[PAN Mobile] loadChat: msgs=' + all.length + ' recent=' + recent.length + ' fp_changed=' + fpChanged);
        // Ship loadChat status to server for remote debugging
        if (fpChanged) {
          fetch(API + '/api/v1/logs', { method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ device_id: 'phone-dashboard', level: 'info', source: 'app',
              message: 'loadChat: msgs=' + all.length + ' recent=' + recent.length + ' fp_changed=true rendering=' + recent.slice(-2).map(m=>m.role+':'+((m.text||m.content||'').slice(0,40))).join(' | ') })
          }).catch(() => {});
        }
        if (!fpChanged) return;
        _lastFingerprint = fingerprint;
        const wasNearBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < 80;
        el.innerHTML = '';
        for (const m of recent) {
          const role = m.role || 'assistant';
          const text = (m.text || m.content || '').slice(0, 1000);
          if (!text.trim()) continue;
          const cls = role === 'user' ? 't-user' : 't-assistant';
          const name = role === 'user' ? USERNAME : LLMNAME;
          el.insertAdjacentHTML('beforeend', '<div class="t-line ' + cls + '"><span class="name">' + esc(name) + '</span><span class="sep">$ </span>' + esc(text) + '</div>');
        }
        _renderedMsgIds = recent.map(() => 1);
        // Always scroll to bottom — on mobile, latest messages matter most
        // Use requestAnimationFrame to ensure DOM has rendered before scrolling
        requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
        return;
      }
    }
    // Fallback: show events if no active terminal session
    if (_renderedMsgIds.length > 0) return;
    let url = API + '/dashboard/api/events?limit=30&type=RouterCommand';
    const res = await fetch(url);
    const data = await res.json();
    const events = (data.events || []).reverse();
    if (!events.length) { el.innerHTML = '<div class="muted">No conversations yet</div>'; return; }
    el.innerHTML = '';
    for (const e of events) {
      try {
        const d = JSON.parse(e.data);
        const text = d.text || d.query || '';
        const resp = d.result || d.response || '';
        if (text) el.innerHTML += '<div class="t-line t-user"><span class="name">' + esc(USERNAME) + '</span><span class="sep">$ </span>' + esc(text.slice(0,500)) + '</div>';
        if (resp && resp !== '[AMBIENT]') el.innerHTML += '<div class="t-line t-assistant"><span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>' + esc(resp.slice(0,500)) + '</div>';
      } catch {}
    }
    el.scrollTop = el.scrollHeight;
  } catch(e) { el.innerHTML = '<div class="muted">Error: '+e.message+'</div>'; }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  lastSentTime = Date.now();
  const el = document.getElementById('chat-msgs');
  const status = document.getElementById('chat-status');
  // Optimistic local echo as a terminal user line + faded pending placeholder
  el.insertAdjacentHTML('beforeend', '<div class="t-line t-user"><span class="name">' + esc(USERNAME) + '</span><span class="sep">$ </span>' + esc(text) + '</div>');
  el.insertAdjacentHTML('beforeend', '<div class="t-line t-assistant t-pending" id="chat-typing"><span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>thinking…</div>');
  el.scrollTop = el.scrollHeight;
  if (status) status.style.display = 'flex';

  // Find the best matching session — query active sessions from server
  let sessionId = activeProject ? 'dash-' + activeProject.name.toLowerCase().replace(/\s+/g, '-') : 'dash-pan';
  try {
    const sessRes = await fetch(API + '/api/v1/terminal/sessions');
    const sessData = await sessRes.json();
    const sessions = sessData.sessions || [];
    console.log('[PAN Mobile] sessions:', sessions.map(s => s.id).join(', '));
    // Find session matching this project (e.g. dash-pan-1 matches dash-pan)
    const match = sessions.find(s => s.id.startsWith(sessionId)) || sessions[0];
    if (match) sessionId = match.id;
    console.log('[PAN Mobile] resolved sessionId:', sessionId);
  } catch(sessErr) { console.error('[PAN Mobile] session lookup failed:', sessErr); }
  try {
    console.log('[PAN Mobile] sending to', API + '/api/v1/terminal/pipe', 'session:', sessionId);
    const res = await fetch(API + '/api/v1/terminal/pipe', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text: text, session_id: sessionId })
    });
    console.log('[PAN Mobile] pipe response status:', res.status);
    const data = await res.json();
    console.log('[PAN Mobile] pipe response:', JSON.stringify(data));
    // Ship debug info to server for remote diagnosis
    fetch(API + '/api/v1/logs', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ device_id: 'phone-dashboard', level: 'info', source: 'app', message: 'pipe response: ' + JSON.stringify(data) + ' session: ' + sessionId })
    }).catch(() => {});
    if (!data.ok) {
      const t = document.getElementById('chat-typing');
      if (t) { t.innerHTML = '<span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>send failed: ' + esc(data.error || JSON.stringify(data)); t.style.color = 'var(--red)'; t.removeAttribute('id'); }
      if (status) status.style.display = 'none';
      return;
    }
    // Poll transcript for Claude's response
    let prevCount = _renderedMsgIds.length;
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 3000));
      loadChat._forceLoad = true;
      await loadChat();
      if (_renderedMsgIds.length > prevCount + 1) {
        const t = document.getElementById('chat-typing');
        if (t) t.remove();
        break;
      }
    }
    const t = document.getElementById('chat-typing');
    if (t) { t.innerHTML = '<span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>still processing…'; t.removeAttribute('id'); }
  } catch(e) {
    console.error('[PAN Mobile] send error:', e);
    fetch(API + '/api/v1/logs', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ device_id: 'phone-dashboard', level: 'error', source: 'app', message: 'send error: ' + e.message + ' session: ' + sessionId })
    }).catch(() => {});
    const t = document.getElementById('chat-typing');
    if (t) { t.innerHTML = '<span class="name">' + esc(LLMNAME) + '</span><span class="sep">$ </span>error: ' + esc(e.message); t.style.color = 'var(--red)'; t.removeAttribute('id'); }
  }
  if (status) status.style.display = 'none';
  lastSentTime = 0;
  el.scrollTop = el.scrollHeight;
}

// Direct DB queries — don't waste Cerebras tokens on simple lookups
function tryDirectQuery(text) {
  const lower = text.toLowerCase();
  if (lower.match(/how many (events|sessions|projects|devices|memories)/)) {
    return fetch(API + '/dashboard/api/stats').then(r=>r.json()).then(s => {
      return 'Stats: ' + s.total_events + ' events, ' + s.total_sessions + ' sessions, ' + s.total_projects + ' projects, ' + s.total_devices + ' devices, ' + s.total_memory + ' memories. DB: ' + (s.db_size_bytes/1048576).toFixed(1) + ' MB';
    });
  }
  if (lower.match(/show.*events|recent events|latest events|what happened/)) {
    return fetch(API + '/dashboard/api/events?limit=5').then(r=>r.json()).then(d => {
      return (d.events||[]).map(e => {
        const dd = JSON.parse(e.data);
        return e.event_type + ': ' + (dd.text||dd.response||'').slice(0,60);
      }).join('\n') || 'No events';
    });
  }
  if (lower.match(/show.*projects|list projects|my projects/)) {
    return fetch(API + '/dashboard/api/projects').then(r=>r.json()).then(ps => {
      return ps.map(p => p.name + ' — ' + (p.description||p.path)).join('\n');
    });
  }
  if (lower.match(/show.*tasks|how many tasks|task progress|project progress/)) {
    const pid = activeProject?.id || projects.find(p => p.name === 'PAN')?.id || 791;
    return fetch(API + '/dashboard/api/projects/' + pid + '/tasks').then(r=>r.json()).then(d => {
      const ms = d.milestones || [];
      let total=0, done=0;
      ms.forEach(m => { const t=m.tasks||[]; total+=t.length; done+=t.filter(x=>x.status==='done').length; });
      const pct = total ? Math.round(done/total*100) : 0;
      return (activeProject?.name||'PAN') + ': ' + done + '/' + total + ' tasks done (' + pct + '%)\n' +
        ms.map(m => { const t=m.tasks||[]; const d=t.filter(x=>x.status==='done').length; return '  ' + m.name + ': ' + d + '/' + t.length; }).join('\n');
    });
  }
  if (lower.match(/show.*devices|list devices|my devices/)) {
    return fetch(API + '/api/v1/devices/list').then(r=>r.json()).then(ds => {
      return ds.map(d => (d.name||d.device_id) + ' (ID:' + d.id + ')').join('\n') || 'No devices';
    });
  }
  if (lower.match(/status|health|uptime/)) {
    return fetch(API + '/health').then(r=>r.json()).then(h => {
      return 'PAN Hub: ' + h.status + ', uptime: ' + (h.uptime||'?');
    });
  }
  return null;
}



// ========== PROJECTS ==========
async function loadProjects() {
  const el = document.getElementById('projects');
  try {
    const pid = activeProject?.id || projects.find(p => p.name === 'PAN')?.id || 791;
    const [projRes, tasksRes] = await Promise.all([
      fetch(API + '/dashboard/api/projects'),
      fetch(API + '/dashboard/api/projects/' + pid + '/tasks')
    ]);
    const projs = await projRes.json();
    const tasksData = await tasksRes.json();
    const allTasks = tasksData.tasks || [];
    // Group tasks by milestone
    const milestones = (tasksData.milestones || []).map(m => ({
      ...m,
      tasks: allTasks.filter(t => t.milestone_id === m.id)
    }));
    const uncategorized = allTasks.filter(t => !t.milestone_id);

    // Overall progress
    let totalDone = 0, totalAll = 0;
    totalAll = allTasks.length;
    totalDone = allTasks.filter(t => t.status === 'done').length;
    const overallPct = totalAll > 0 ? Math.round(totalDone / totalAll * 100) : 0;

    let html = '';

    // Overall progress for active project
    html += '<div class="card" style="margin-top:8px"><h3>' + esc(activeProject?.name || 'PAN') + '</h3>';
    if (totalAll === 0) {
      html += '<div style="font-size:13px;color:var(--text2);padding:4px 0">' + projs.length + ' projects tracked</div>';
    } else {
      html += '<div style="display:flex;justify-content:space-between;margin:4px 0"><span style="font-size:13px">' + totalDone + '/' + totalAll + ' tasks done</span><span style="font-size:13px;color:var(--accent)">' + overallPct + '%</span></div>';
      html += '<div class="progress-bg"><div class="progress-fill" style="width:' + overallPct + '%"></div></div>';
    }
    html += '</div>';

    // Milestones
    for (const m of milestones) {
      const tasks = m.tasks || [];
      const done = tasks.filter(t => t.status === 'done').length;
      const total = tasks.length;
      const pct = total > 0 ? Math.round(done / total * 100) : 0;
      html += '<div class="milestone">';
      html += '<div class="milestone-header" onclick="this.parentElement.querySelector(\'.milestone-tasks\').classList.toggle(\'open\')">';
      html += '<span class="milestone-name">' + esc(m.name) + '</span>';
      html += '<span class="milestone-pct">' + done + '/' + total + ' (' + pct + '%)</span>';
      html += '</div>';
      html += '<div class="progress-bg" style="margin:0 12px"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
      html += '<div class="milestone-tasks">';
      for (const t of tasks) {
        const icon = t.status === 'done' ? '<span class="task-check">✓</span>' : '<span class="task-open">○</span>';
        html += '<div class="task-row">' + icon + ' ' + esc(t.title) + '</div>';
      }
      html += '</div></div>';
    }

    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="muted">Error: '+e.message+'</div>'; }
}

// ========== STATUS — burn rate + session health ==========
async function loadStatus() {
  const el = document.getElementById('status');
  try {
    const [usageRes, healthRes, statsRes] = await Promise.all([
      fetch(API + '/api/v1/claude-usage'),
      fetch(API + '/health'),
      fetch(API + '/dashboard/api/stats'),
    ]);
    const usage = usageRes.ok ? await usageRes.json() : {};
    const health = healthRes.ok ? await healthRes.json() : {};
    const stats = statsRes.ok ? await statsRes.json() : {};
    let ctx = { total: 0, static: 0, injected: 0, tokens_approx: 0 };
    try { const cr = await fetch(API + '/api/v1/context/size'); if (cr.ok) ctx = await cr.json(); } catch {}

    const rl = usage.rateLimits;
    const sess = usage.session || {};
    const msgs = sess.messages || 0;
    const totalTok = (sess.input || 0) + (sess.output || 0);
    const perMsg = msgs > 0 ? Math.round(totalTok / msgs) : 0;
    const utilPct = rl?.five_hour?.utilization || 0;
    const pctPerMsg = msgs > 0 ? (utilPct / msgs) : 0;
    const remaining = pctPerMsg > 0 ? Math.floor((100 - utilPct) / pctPerMsg) : null;

    let html = '';

    // ── Claude Plan Limits (matches desktop) ──
    if (rl) {
      html += '<div class="section-title">Claude Plan Limits</div><div class="card">';
      html += '<div class="setting-row" style="opacity:0.6;font-size:11px"><span class="setting-label">' + (rl.subscriptionType || 'Plan').toUpperCase() + '</span><span class="setting-val">' + (rl.rateLimitTier || '') + '</span></div>';

      if (rl.five_hour) {
        const u = rl.five_hour.utilization;
        const c = u >= 80 ? 'var(--red)' : u >= 50 ? '#f9e2af' : 'var(--green)';
        const resetMs = rl.five_hour.resets_at ? rl.five_hour.resets_at - Date.now() : 0;
        const resetH = Math.floor(resetMs / 3600000);
        const resetM = Math.floor((resetMs % 3600000) / 60000);
        const resetStr = resetMs > 0 ? resetH + 'h ' + resetM + 'm' : 'now';
        html += '<div style="font-size:12px;color:var(--text2);margin-top:8px">Session (5hr Window)</div>';
        html += '<div class="progress-bg"><div class="progress-fill" style="width:' + Math.min(u, 100) + '%;background:' + c + '"></div></div>';
        html += '<div class="setting-row"><span class="setting-label" style="color:' + c + '">' + Math.round(u) + '% Used</span><span class="setting-val">Resets in ' + resetStr + '</span></div>';
      }

      if (rl.seven_day) {
        const u = rl.seven_day.utilization;
        const c = u >= 80 ? 'var(--red)' : u >= 50 ? '#f9e2af' : 'var(--green)';
        html += '<div style="font-size:12px;color:var(--text2);margin-top:8px">Weekly Limit</div>';
        html += '<div class="progress-bg"><div class="progress-fill" style="width:' + Math.min(u, 100) + '%;background:' + c + '"></div></div>';
        html += '<div class="setting-row"><span class="setting-label" style="color:' + c + '">' + Math.round(u) + '% Used</span><span class="setting-val">Resets in ' + fmtReset(rl.seven_day.resets_at) + '</span></div>';
      }

      if (rl.extra_usage) {
        html += '<div style="font-size:12px;color:var(--text2);margin-top:8px">Extra Usage</div>';
        html += '<div class="progress-bg"><div class="progress-fill" style="width:' + Math.min(rl.extra_usage.utilization, 100) + '%;background:#89b4fa"></div></div>';
        html += '<div class="setting-row"><span class="setting-label" style="color:#89b4fa">' + Math.round(rl.extra_usage.utilization) + '% Used</span></div>';
      }
      html += '</div>';
    }

    // ── Burn Rate (matches desktop) ──
    html += '<div class="section-title">Burn Rate</div><div class="card">';
    if (msgs > 0) {
      const pc = pctPerMsg > 5 ? 'var(--red)' : pctPerMsg > 2 ? '#f9e2af' : 'var(--green)';
      const rc = remaining !== null && remaining < 10 ? 'var(--red)' : remaining !== null && remaining < 30 ? '#f9e2af' : 'var(--green)';
      html += '<div class="setting-row"><span class="setting-label">Per Message</span><span class="setting-val" style="color:#cba6f7;font-weight:600">' + fmtTok(perMsg) + ' tok</span></div>';
      html += '<div class="setting-row"><span class="setting-label">% Per Message</span><span class="setting-val" style="color:' + pc + ';font-weight:600">' + pctPerMsg.toFixed(1) + '%</span></div>';
      html += '<div class="setting-row"><span class="setting-label">Messages Left</span><span class="setting-val" style="color:' + rc + ';font-weight:600">' + (remaining !== null ? '~' + remaining : '?') + '</span></div>';

      html += '<div class="setting-row"><span class="setting-label">Total Used</span><span class="setting-val">' + fmtTok(totalTok) + '</span></div>';
      html += '<div class="setting-row"><span class="setting-label">Cache Hits</span><span class="setting-val">' + fmtTok(sess.cache_read) + ' (' + (totalTok > 0 ? Math.round((sess.cache_read || 0) / ((sess.cache_read || 0) + (sess.input || 1)) * 100) : 0) + '%)</span></div>';
    } else {
      html += '<div class="setting-row" style="opacity:0.5"><span class="setting-label">No messages yet</span></div>';
    }
    html += '</div>';

    // ── Session Tokens (matches desktop) ──
    html += '<div class="section-title">Session Tokens</div><div class="card">';
    html += '<div class="setting-row"><span class="setting-label">Model</span><span class="setting-val">' + esc(usage.model || 'unknown') + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Active Sessions</span><span class="setting-val">' + (sess.activeSessions || 0) + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Output</span><span class="setting-val">' + fmtTok(sess.output) + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Input</span><span class="setting-val">' + fmtTok(sess.input) + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Cache Read</span><span class="setting-val">' + fmtTok(sess.cache_read) + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Messages</span><span class="setting-val">' + msgs + '</span></div>';
    html += '<div style="font-size:12px;color:var(--text2);margin-top:8px">Today</div>';
    html += '<div class="setting-row"><span class="setting-label">Output</span><span class="setting-val">' + fmtTok(usage.today?.output) + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Messages</span><span class="setting-val">' + (usage.today?.messages || 0) + '</span></div>';
    html += '</div>';

    // ── Context (phone-only — reset button) ──
    html += '<div class="section-title">Context</div><div class="card">';
    const ctxColor = ctx.critical ? 'var(--red)' : ctx.warning ? '#f9e2af' : 'var(--green)';
    html += '<div class="setting-row"><span class="setting-label">CLAUDE.md</span><span class="setting-val" style="color:' + ctxColor + ';font-weight:600">' + fmtTok(ctx.total) + ' chars (~' + fmtTok(ctx.tokens_approx) + ' tok)</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Static Docs</span><span class="setting-val">' + fmtTok(ctx.static) + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Injected</span><span class="setting-val" style="color:' + (ctx.injected > 4000 ? 'var(--red)' : ctx.injected > 1000 ? '#f9e2af' : 'var(--green)') + '">' + fmtTok(ctx.injected) + '</span></div>';
    if (ctx.injected > 100) {
      html += '<div style="padding:8px 0 4px"><button onclick="resetContext()" style="width:100%;background:var(--red);color:#1e1e2e;border:none;border-radius:var(--radius);padding:10px;font-weight:600;font-size:14px">Reset Context (' + fmtTok(ctx.injected) + ' injected)</button></div>';
    } else {
      html += '<div style="padding:8px 0 4px;text-align:center;font-size:12px;color:var(--green)">Context is clean</div>';
    }
    html += '</div>';

    // ── PAN Stats (matches desktop) ──
    html += '<div class="section-title">PAN Stats</div><div class="card">';
    html += '<div class="setting-row"><span class="setting-label">Total Events</span><span class="setting-val">' + (stats.total_events || 0).toLocaleString() + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Total Sessions</span><span class="setting-val">' + (stats.total_sessions || 0).toLocaleString() + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Memory Items</span><span class="setting-val">' + (stats.total_memory || 0).toLocaleString() + '</span></div>';
    const dbMb = stats.db_size_bytes ? (stats.db_size_bytes / 1048576).toFixed(1) + ' MB' : '--';
    html += '<div class="setting-row"><span class="setting-label">DB Size</span><span class="setting-val">' + dbMb + '</span></div>';
    html += '</div>';

    // Bottom padding for input bar
    html += '<div style="height:60px"></div>';

    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="muted">Error loading usage: ' + e.message + '</div>';
  }
}

function fmtReset(ts) {
  if (!ts) return '';
  const diff = ts - Date.now();
  if (diff <= 0) return 'now';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}

async function resetContext() {
  try {
    const res = await fetch(API + '/api/v1/context/reset', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      // Refresh the status tab to show new size
      loadStatus();
    } else {
      alert('Reset failed: ' + (data.error || 'unknown'));
    }
  } catch(e) { alert('Reset error: ' + e.message); }
}

function fmtTok(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

// ========== ALERTS ==========
async function loadAlerts() {
  const el = document.getElementById('alerts');
  try {
    const [alertsRes, countRes] = await Promise.all([
      fetch(API + '/dashboard/api/alerts?limit=50'),
      fetch(API + '/dashboard/api/alerts/count'),
    ]);
    const alerts = await alertsRes.json();
    const countData = await countRes.json();

    let html = '';

    // Summary bar
    const openCount = countData.count || 0;
    html += '<div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center">';
    html += '<span style="font-size:14px;font-weight:600">' + openCount + ' Open Alert' + (openCount !== 1 ? 's' : '') + '</span>';
    html += '<button onclick="loadAlerts()" style="background:var(--bg2);color:var(--text2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;font-size:12px">Refresh</button>';
    html += '</div>';

    if (!alerts.length) {
      html += '<div class="muted" style="padding:20px 12px;text-align:center">No alerts</div>';
    }

    for (const a of alerts) {
      const sev = a.severity || 'info';
      const time = a.created_at ? a.created_at.slice(5, 16).replace('T', ' ') : '';
      const isOpen = a.status === 'open';

      html += '<div class="alert-card sev-' + sev + '" style="' + (isOpen ? '' : 'opacity:0.5') + '">';
      html += '<div class="alert-meta"><span style="color:' + (sev === 'critical' ? 'var(--red)' : sev === 'warning' ? '#f9e2af' : 'var(--accent)') + ';font-weight:600;text-transform:uppercase">' + sev + '</span><span>' + time + '</span></div>';
      html += '<div class="alert-title">' + esc(a.title || a.alert_type) + '</div>';
      if (a.detail) html += '<div class="alert-detail">' + esc(a.detail.slice(0, 200)) + '</div>';

      if (isOpen) {
        html += '<div class="alert-actions">';
        html += '<button class="alert-ack" onclick="alertAction(' + a.id + ',\'acknowledged\')">Acknowledge</button>';
        html += '<button class="alert-dismiss" onclick="alertAction(' + a.id + ',\'dismissed\')">Dismiss</button>';
        html += '</div>';
      } else {
        html += '<div style="font-size:11px;color:var(--text2);margin-top:4px">' + (a.status || 'closed') + '</div>';
      }
      html += '</div>';
    }

    el.innerHTML = html;

    // Update badge on alerts tab
    const alertTab = document.querySelector('.tab[data-tab="alerts"]');
    if (alertTab) {
      const badge = alertTab.querySelector('.badge');
      if (openCount > 0) {
        if (!badge) alertTab.insertAdjacentHTML('beforeend', ' <span class="badge">' + openCount + '</span>');
        else badge.textContent = openCount;
      } else if (badge) badge.remove();
    }
  } catch(e) {
    el.innerHTML = '<div class="muted">Error: ' + e.message + '</div>';
  }
}

async function alertAction(id, status) {
  try {
    await fetch(API + '/dashboard/api/alerts/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    loadAlerts();
  } catch(e) { alert('Error: ' + e.message); }
}

// ========== TASKS ==========
async function loadTasks() {
  const el = document.getElementById('tasks');
  try {
    let url = API + '/dashboard/api/tasks';
    if (activeProject) url += '?project_id=' + activeProject.id;
    const res = await fetch(url);
    const tasks = await res.json();
    const taskList = Array.isArray(tasks) ? tasks : (tasks.tasks || []);

    let html = '';
    const todo = taskList.filter(t => t.status === 'todo');
    const inProg = taskList.filter(t => t.status === 'in_progress');
    const done = taskList.filter(t => t.status === 'done');

    html += '<div class="stat-grid">';
    html += '<div class="stat-card"><div class="stat-val" style="color:#f9e2af">' + todo.length + '</div><div class="stat-label">Todo</div></div>';
    html += '<div class="stat-card"><div class="stat-val" style="color:var(--accent)">' + inProg.length + '</div><div class="stat-label">In Progress</div></div>';
    html += '</div>';

    function taskRow(t) {
      const icon = t.status === 'done' ? '<span style="color:var(--green)">&#10003;</span>' : t.status === 'in_progress' ? '<span style="color:var(--accent)">&#9654;</span>' : '<span style="color:var(--text2)">&#9675;</span>';
      const pri = t.priority > 0 ? ' <span style="color:var(--red);font-size:10px">P' + t.priority + '</span>' : '';
      const op = t.status === 'done' ? 'opacity:0.5;' : '';
      return '<div class="setting-row" style="' + op + 'cursor:pointer" onclick="cycleTask(' + t.id + ',\'' + t.status + '\')">' +
        '<span class="setting-label">' + icon + ' ' + esc(t.title) + pri + '</span>' +
        '<span class="setting-val" style="font-size:11px;color:var(--text2)">' + t.status + '</span></div>';
    }

    if (inProg.length) { html += '<div class="section-title">In Progress</div><div class="card">'; inProg.forEach(t => { html += taskRow(t); }); html += '</div>'; }
    if (todo.length) { html += '<div class="section-title">Todo</div><div class="card">'; todo.forEach(t => { html += taskRow(t); }); html += '</div>'; }
    if (done.length) { html += '<div class="section-title">Done</div><div class="card">'; done.slice(0, 10).forEach(t => { html += taskRow(t); }); if (done.length > 10) html += '<div style="padding:4px 12px;font-size:11px;color:var(--text2)">+' + (done.length - 10) + ' more</div>'; html += '</div>'; }
    if (!taskList.length) html += '<div class="muted" style="padding:20px;text-align:center">No tasks</div>';
    html += '<div style="height:60px"></div>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="muted">Error: ' + e.message + '</div>'; }
}

async function cycleTask(taskId, currentStatus) {
  const next = currentStatus === 'todo' ? 'in_progress' : currentStatus === 'in_progress' ? 'done' : 'todo';
  try {
    await fetch(API + '/dashboard/api/tasks/' + taskId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: next }) });
    loadTasks();
  } catch(e) { console.error('Task cycle failed:', e); }
}

async function loadDevices() {
  const el = document.getElementById('devices');
  try {
    const res = await fetch(API + '/api/v1/devices/list');
    const devices = Array.isArray(await res.clone().json()) ? await res.json() : [];

    let html = '';
    const online = devices.filter(d => d.last_seen && (Date.now() - new Date(d.last_seen).getTime()) < 300000);
    html += '<div class="stat-grid">';
    html += '<div class="stat-card"><div class="stat-val">' + devices.length + '</div><div class="stat-label">Devices</div></div>';
    html += '<div class="stat-card"><div class="stat-val" style="color:var(--green)">' + online.length + '</div><div class="stat-label">Online</div></div>';
    html += '</div>';

    for (const d of devices) {
      const name = d.name || d.device_name || d.device_id || 'Unknown';
      const lastSeen = d.last_seen ? new Date(d.last_seen) : null;
      const isOnline = lastSeen && (Date.now() - lastSeen.getTime()) < 300000;
      const dot = isOnline ? 'var(--green)' : 'var(--red)';
      html += '<div class="card">';
      html += '<div class="setting-row"><span class="setting-label"><span style="color:' + dot + '">&#9679;</span> ' + esc(name) + '</span><span class="setting-val">' + (isOnline ? 'Online' : lastSeen ? fmtAgo(lastSeen) : 'never') + '</span></div>';
      if (d.device_type) html += '<div class="setting-row"><span class="setting-label" style="color:var(--text2)">Type</span><span class="setting-val">' + esc(d.device_type) + '</span></div>';
      if (d.ip) html += '<div class="setting-row"><span class="setting-label" style="color:var(--text2)">IP</span><span class="setting-val">' + esc(d.ip) + '</span></div>';
      html += '</div>';
    }
    if (!devices.length) html += '<div class="muted" style="padding:20px;text-align:center">No devices</div>';
    html += '<div style="height:60px"></div>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="muted">Error: ' + e.message + '</div>'; }
}

function fmtAgo(date) {
  const ms = Date.now() - date.getTime();
  if (ms < 60000) return 'just now';
  if (ms < 3600000) return Math.floor(ms / 60000) + 'm ago';
  if (ms < 86400000) return Math.floor(ms / 3600000) + 'h ago';
  return Math.floor(ms / 86400000) + 'd ago';
}

let _libraryItems = [];
let _libraryFilter = 'all';

async function loadLibrary_m() {
  const el = document.getElementById('library');
  try {
    if (!_libraryItems.length) {
      const res = await fetch(API + '/api/v1/library');
      const j = await res.json();
      _libraryItems = j.items || [];
    }

    let html = '';

    // Search + filter bar
    html += '<div style="padding:8px 12px;display:flex;gap:8px">';
    html += '<input type="text" id="lib-search" placeholder="Search library..." oninput="filterLibrary()" style="flex:1;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;outline:none">';
    html += '<select id="lib-filter" onchange="filterLibrary()" style="background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:8px;font-size:13px">';
    html += '<option value="all">All</option><option value="doc">Docs</option><option value="memory">Memory</option><option value="pan">PAN State</option>';
    html += '</select></div>';

    // Type summary
    const docs = _libraryItems.filter(i => i.type === 'doc');
    const mem = _libraryItems.filter(i => i.type === 'memory');
    const pan = _libraryItems.filter(i => i.type === 'pan');
    html += '<div class="stat-grid">';
    html += '<div class="stat-card"><div class="stat-val">' + _libraryItems.length + '</div><div class="stat-label">Total</div></div>';
    html += '<div class="stat-card"><div class="stat-val" style="color:var(--accent)">' + docs.length + '</div><div class="stat-label">Docs</div></div>';
    html += '</div>';

    // Items list
    html += '<div id="lib-list">';
    html += renderLibraryItems(_libraryItems);
    html += '</div>';

    html += '<div style="height:60px"></div>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="muted">Error: ' + e.message + '</div>'; }

function renderLibraryItems(items) {
  let html = '';
  for (const item of items) {
    const typeColor = item.type === 'doc' ? 'var(--accent)' : item.type === 'memory' ? '#cba6f7' : 'var(--green)';
    html += '<div class="card" style="cursor:pointer" onclick="openLibItem(\'' + esc(item.path).replace(/'/g, "\\'") + '\')">';
    html += '<div style="display:flex;align-items:center;gap:8px">';
    html += '<span style="background:' + typeColor + ';color:#1e1e2e;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase">' + esc(item.type) + '</span>';
    html += '<span style="font-size:13px;font-weight:500">' + esc(item.title) + '</span>';
    html += '</div>';
    if (item.snippet) html += '<div style="font-size:12px;color:var(--text2);margin-top:4px;max-height:40px;overflow:hidden">' + esc(item.snippet) + '</div>';
    html += '</div>';
  }
  return html;
}

function filterLibrary() {
  const q = (document.getElementById('lib-search')?.value || '').toLowerCase();
  const f = document.getElementById('lib-filter')?.value || 'all';
  const filtered = _libraryItems.filter(i => {
    if (f !== 'all' && i.type !== f) return false;
    if (q && !i.title.toLowerCase().includes(q) && !(i.snippet || '').toLowerCase().includes(q)) return false;
    return true;
  });
  const listEl = document.getElementById('lib-list');
  if (listEl) listEl.innerHTML = renderLibraryItems(filtered);
}

function openLibItem(path) {
  window.open(API + '/api/v1/library/view?path=' + encodeURIComponent(path), '_blank');
}

}


// ========== SETTINGS ==========
async function loadSettings() {
  const el = document.getElementById('settings');
  let html = '';

  // Display Name — editable setting
  html += '<div class="section-title">Identity</div><div class="card">';
  try {
    const settingsRes = await fetch(API + '/api/v1/settings');
    const settings = await settingsRes.json();
    const currentName = settings.display_name || _orgContext?.user_nickname || 'User';
    html += '<div class="setting-row"><span class="setting-label">Display Name</span>';
    html += '<input id="display-name-input" value="' + esc(currentName) + '" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;font-size:13px;width:120px;text-align:right;outline:none" onchange="saveDisplayName(this.value)">';
    html += '</div>';
    html += '<div style="padding:2px 12px 8px;font-size:11px;color:var(--text2)">Your name shown on the dashboard and org badge. Tap to edit.</div>';
  } catch { html += '<div class="setting-row"><span class="setting-label">Display Name</span><span class="setting-val">' + esc(_orgContext?.user_nickname || 'User') + '</span></div>'; }
  html += '</div>';

  // Organization
  html += '<div class="section-title">Organization</div><div class="card">';
  if (_orgContext) {
    html += '<div class="setting-row"><span class="setting-label">Current Org</span><span class="setting-val">' + esc(_orgContext.org_name || 'User') + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Role</span><span class="setting-val">' + esc((_orgContext.role || 'owner').charAt(0).toUpperCase() + (_orgContext.role || 'owner').slice(1)) + '</span></div>';
  } else {
    html += '<div class="setting-row"><span class="setting-label">Current Org</span><span class="setting-val">' + esc(_orgContext?.org_name || 'User') + '</span></div>';
  }
  html += '</div>';

  // Incognito
  html += '<div class="section-title">Privacy</div><div class="card">';
  html += '<div class="setting-row"><span class="setting-label">Incognito Mode</span>';
  html += '<button class="incognito-btn ' + (_incognitoActive ? 'on' : 'off') + '" onclick="toggleIncognito()">';
  html += (_incognitoActive ? '\uD83D\uDD12 Active' : '\uD83D\uDD13 Off');
  html += '</button></div>';
  html += '<div style="padding:4px 12px 8px;font-size:11px;color:var(--text2)">When active, events are temporary and auto-expire.</div>';
  html += '</div>';

  // Orgs list
  if (_orgContext && _orgContext.orgs && _orgContext.orgs.length > 0) {
    html += '<div class="section-title">Your Organizations</div><div class="card">';
    for (const o of _orgContext.orgs) {
      const isActive = o.org_id === _orgContext.org_id;
      html += '<div class="setting-row"><span class="setting-label">' + esc(o.name);
      if (isActive) html += ' <span style="color:var(--green);font-size:11px">(active)</span>';
      html += '</span><span class="setting-val">' + esc(o.role_name || 'member') + '</span></div>';
    }
    html += '</div>';
  }

  // Connection
  html += '<div class="section-title">Connection</div><div class="card">';
  try {
    const res = await fetch(API + '/health');
    const h = await res.json();
    html += '<div class="setting-row"><span class="setting-label">PAN Server</span><span class="setting-val" style="color:var(--green)">' + (h.ok ? 'Connected' : 'Error') + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Carrier</span><span class="setting-val">' + (h.carrier ? '✓ Active' : '✗ Down') + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Craft</span><span class="setting-val">' + (h.craftHealthy ? '✓ Healthy' : '✗ Unhealthy') + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Proxy</span><span class="setting-val">' + API + '</span></div>';
    if (h.tailscaleIp) html += '<div class="setting-row"><span class="setting-label">Tailscale IP</span><span class="setting-val">' + h.tailscaleIp + '</span></div>';
  } catch(e) {
    html += '<div class="setting-row"><span class="setting-label">Status</span><span class="setting-val" style="color:var(--red)">Disconnected</span></div>';
  }
  html += '</div>';

  // AI — fetch actual configured model from settings
  html += '<div class="section-title">AI</div><div class="card">';
  try {
    const [authRes, settingsRes] = await Promise.all([
      fetch(API + '/api/v1/auth/providers'),
      fetch(API + '/api/v1/settings')
    ]);
    const auth = await authRes.json();
    const settings = await settingsRes.json();
    const mode = (auth.auth_mode || 'none').charAt(0).toUpperCase() + (auth.auth_mode || 'none').slice(1);
    html += '<div class="setting-row"><span class="setting-label">Auth Mode</span><span class="setting-val">' + mode + '</span></div>';
    // Parse the ai_model setting (format: "cerebras:qwen-3-235b" or "claude-sonnet-4-20250514")
    const aiModel = settings.ai_model || 'cerebras:qwen-3-235b';
    const parts = aiModel.split(':');
    const backend = parts.length > 1 ? parts[0].charAt(0).toUpperCase() + parts[0].slice(1) : 'Claude';
    const modelName = (parts.length > 1 ? parts[1] : parts[0]).replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    html += '<div class="setting-row"><span class="setting-label">Backend</span><span class="setting-val">' + esc(backend) + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Model</span><span class="setting-val">' + esc(modelName) + '</span></div>';
  } catch {
    html += '<div class="setting-row"><span class="setting-label">Backend</span><span class="setting-val">Unknown</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Model</span><span class="setting-val">Unknown</span></div>';
  }
  html += '</div>';

  // Devices
  html += '<div class="section-title">Devices</div><div class="card">';
  try {
    const res = await fetch(API + '/api/v1/devices/list');
    const devs = await res.json();
    for (const d of devs) {
      const name = d.name || d.device_name || d.device_id || 'Device';
      html += '<div class="setting-row"><span class="setting-label">' + esc(name) + '</span><span class="setting-val">' + (d.last_seen ? 'Online' : '—') + '</span></div>';
    }
  } catch {}
  html += '</div>';

  // Phone
  html += '<div class="section-title">This Device</div><div class="card">';
  html += '<div class="setting-row"><span class="setting-label">Platform</span><span class="setting-val">' + (navigator.userAgent.match(/Android[^;]*/)?.[0] || 'Android') + '</span></div>';
  html += '<div class="setting-row"><span class="setting-label">Screen</span><span class="setting-val">' + screen.width + 'x' + screen.height + '</span></div>';
  html += '<div class="setting-row"><span class="setting-label">WebView</span><span class="setting-val">' + (navigator.userAgent.match(/Chrome\/[\d.]+/)?.[0] || '?') + '</span></div>';
  html += '</div>';

  // Diagnostics — IP, Tailscale, server PID, uptime, memory
  html += '<div class="section-title">Diagnostics</div><div class="card">';
  try {
    const res = await fetch(API + '/api/v1/diagnostics');
    const d = await res.json();
    html += '<div class="setting-row"><span class="setting-label">Server PID</span><span class="setting-val">' + (d.server_pid || '?') + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Uptime</span><span class="setting-val">' + esc(d.uptime || '?') + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Memory</span><span class="setting-val">' + (d.memory_mb || '?') + ' MB</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Node</span><span class="setting-val">' + esc(d.node_version || '?') + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Mode</span><span class="setting-val">' + esc(d.mode || '?') + '</span></div>';
    if (d.craft_id) html += '<div class="setting-row"><span class="setting-label">Craft ID</span><span class="setting-val">' + esc(d.craft_id) + '</span></div>';
    const tsColor = d.tailscale_status === 'connected' ? 'var(--green)' : 'var(--red)';
    html += '<div class="setting-row"><span class="setting-label">Tailscale</span><span class="setting-val" style="color:' + tsColor + '">' + (d.tailscale_status === 'connected' ? 'Connected' : 'Disconnected') + '</span></div>';
    if (d.tailscale_ip) html += '<div class="setting-row"><span class="setting-label">Tailscale IP</span><span class="setting-val">' + esc(d.tailscale_ip) + '</span></div>';
    html += '<div class="setting-row"><span class="setting-label">Client IP</span><span class="setting-val">' + esc(window.location.hostname) + ':' + esc(window.location.port || '80') + '</span></div>';
  } catch (e) {
    html += '<div class="setting-row"><span class="setting-label">Status</span><span class="setting-val" style="color:var(--red)">Unavailable</span></div>';
  }
  html += '</div>';

  el.innerHTML = html;
}


function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

// ========== ORG CONTEXT + INCOGNITO ==========
let _orgContext = null;
let _incognitoActive = false;

async function loadOrgContext() {
  try {
    const [orgRes, incRes] = await Promise.all([
      fetch(API + '/api/v1/org/current'),
      fetch(API + '/api/v1/incognito/status')
    ]);
    _orgContext = await orgRes.json();
    const incData = await incRes.json();
    _incognitoActive = !!(incData.active);
  } catch (e) {
    console.error('[PAN Mobile] org context error:', e);
    _orgContext = { org_id: 'org_personal', org_name: 'User', org_slug: 'personal', user_nickname: 'User', role: 'owner', orgs: [] };
    _incognitoActive = false;
  }
  updateOrgBadge();
}

function updateOrgBadge() {
  const textEl = document.getElementById('org-badge-text');
  const lockEl = document.getElementById('org-badge-lock');
  const titleEl = document.getElementById('topbar-title');
  const topbar = document.getElementById('topbar');
  if (!_orgContext) return;
  const nick = _orgContext.user_nickname || _orgContext.user_display_name || 'User';
  const orgName = _orgContext.org_name || 'Personal';
  textEl.textContent = nick + '@' + orgName;
  // Show org name next to Pi in the title
  titleEl.textContent = '\u03A0 ' + orgName;
  // Apply org color to top bar background (subtle — darkened for dark theme)
  if (_orgContext.org_color && _orgContext.org_id !== 'org_personal') {
    topbar.style.background = hexToRgba(_orgContext.org_color, 0.15);
    topbar.style.borderBottomColor = hexToRgba(_orgContext.org_color, 0.3);
  } else {
    topbar.style.background = '';
    topbar.style.borderBottomColor = '';
  }
  if (_incognitoActive) {
    lockEl.textContent = '\uD83D\uDD12';
    lockEl.style.display = 'inline';
  } else {
    lockEl.style.display = 'none';
  }
}

// Convert hex color to rgba for subtle dark-theme overlay
function hexToRgba(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

function showOrgSwitcher() {
  const modal = document.getElementById('org-modal');
  const list = document.getElementById('org-modal-list');
  modal.classList.add('visible');
  if (!_orgContext || !_orgContext.orgs || _orgContext.orgs.length === 0) {
    list.innerHTML = '<div class="muted">No organizations found</div>';
    return;
  }
  list.innerHTML = '';
  for (const o of _orgContext.orgs) {
    const isActive = o.org_id === _orgContext.org_id;
    const div = document.createElement('div');
    div.className = 'org-modal-item' + (isActive ? ' active' : '');
    div.innerHTML = '<div><div class="org-item-name">' + esc(o.name) + '</div>' +
      '<div class="org-item-role">' + esc(o.role_name || 'member') + '</div></div>' +
      (isActive ? '<span style="color:var(--accent);font-size:13px">Active</span>' : '');
    if (!isActive) {
      div.addEventListener('click', () => switchOrg(o.org_id));
    }
    list.appendChild(div);
  }
}

async function switchOrg(orgId) {
  try {
    const res = await fetch(API + '/api/v1/orgs/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ org_id: orgId })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Failed to switch org');
      return;
    }
    // Refresh org context and close modal
    hideOrgSwitcher();
    await loadOrgContext();
    // Reload active tab to reflect new org
    const active = document.querySelector('.page.active');
    if (active) loadTab(active.id);
  } catch (e) {
    alert('Error switching org: ' + e.message);
  }
}

function hideOrgSwitcher() {
  document.getElementById('org-modal').classList.remove('visible');
}

async function saveDisplayName(name) {
  if (!name || !name.trim()) return;
  try {
    await fetch(API + '/api/v1/settings', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name: name.trim() })
    });
    // Refresh org context so badge updates
    await loadOrgContext();
    loadSettings();
  } catch(e) { console.error('Save display name failed:', e); }
}

async function toggleIncognito() {
  try {
    const endpoint = _incognitoActive ? '/api/v1/incognito/stop' : '/api/v1/incognito/start';
    const res = await fetch(API + endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    const data = await res.json();
    if (res.ok) {
      _incognitoActive = !_incognitoActive;
      updateOrgBadge();
      loadSettings();
    } else {
      alert(data.error || 'Failed to toggle incognito');
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// Screenshot upload — reads file, converts to base64, sends to server
async function uploadScreenshot(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  input.value = ''; // reset so same file can be re-selected

  const el = document.getElementById('chat-msgs');
  el.insertAdjacentHTML('beforeend', '<div class="t-line t-tool"><span class="arrow">→</span> Uploading screenshot...</div>');
  el.scrollTop = el.scrollHeight;

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]); // strip data:image/...;base64,
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const res = await fetch(API + '/api/v1/screenshot/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: base64, mimeType: file.type, source: 'phone' })
    });
    const result = await res.json();

    if (result.ok) {
      el.insertAdjacentHTML('beforeend', '<div class="t-line t-tool"><span class="arrow">→</span> Screenshot uploaded: ' + esc(result.filename) + '</div>');
      // Auto-send a message referencing the screenshot so Claude sees it
      const chatInput = document.getElementById('chat-input');
      chatInput.value = result.path;
      sendChat();
    } else {
      el.insertAdjacentHTML('beforeend', '<div class="t-line" style="color:var(--red)">Upload failed: ' + esc(result.error || 'unknown') + '</div>');
    }
  } catch(e) {
    el.insertAdjacentHTML('beforeend', '<div class="t-line" style="color:var(--red)">Upload error: ' + esc(e.message) + '</div>');
  }
  el.scrollTop = el.scrollHeight;
}

// Textarea auto-grow — expand as user types, up to max-height
function autoGrowTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Keyboard visibility — keep input bar above the soft keyboard on Android
// Three strategies combined for maximum compatibility:
(function() {
  const inputBar = document.getElementById('input-bar');
  const chatInput = document.getElementById('chat-input');
  if (!inputBar || !chatInput) return;

  // Strategy 1: visualViewport API (best, but not always reliable)
  if (window.visualViewport) {
    function adjustForKeyboard() {
      const offset = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
      inputBar.style.bottom = Math.max(0, offset) + 'px';
    }
    window.visualViewport.addEventListener('resize', adjustForKeyboard);
    window.visualViewport.addEventListener('scroll', adjustForKeyboard);
  }

  // Strategy 2: On focus, scroll the input into view after keyboard animation
  chatInput.addEventListener('focus', () => {
    setTimeout(() => {
      chatInput.scrollIntoView({ block: 'end', behavior: 'smooth' });
      // Also try the viewport approach again after keyboard settles
      if (window.visualViewport) {
        const offset = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
        inputBar.style.bottom = Math.max(0, offset) + 'px';
      }
    }, 300);
    // Second attempt after keyboard fully open
    setTimeout(() => {
      chatInput.scrollIntoView({ block: 'end', behavior: 'smooth' });
    }, 600);
  });

  // Strategy 3: Reset on blur (keyboard closes)
  chatInput.addEventListener('blur', () => {
    setTimeout(() => { inputBar.style.bottom = '0px'; }, 100);
  });
})();

// ========== REFRESH BUTTON ==========
function refreshCurrentTab() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.style.transform = 'rotate(360deg)'; btn.style.transition = 'transform 0.5s'; setTimeout(() => { btn.style.transform = ''; btn.style.transition = ''; }, 600); }
  const active = document.querySelector('.page.active');
  if (active) loadTab(active.id);
  // Also re-fetch library items cache
  _libraryItems = [];
}

init();
document.title = 'PAN v3.' + Date.now();
console.log('PAN Mobile v3 loaded at ' + new Date().toISOString());
