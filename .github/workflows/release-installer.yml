name: Release Installer Binaries

# Triggered when a version tag is pushed: git tag v0.3.2 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install service dependencies
        working-directory: service
        run: npm install

      - name: Install @yao-pkg/pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build installer binaries
        working-directory: service
        run: node scripts/build-installer.js

      - name: List built binaries
        run: ls -lh service/bin/pan-installer-*

      - name: Create GitHub Release with binaries
        uses: softprops/action-gh-release@v2
        with:
          name: "PAN ${{ github.ref_name }}"
          body: |
            ## PAN Device Installer ${{ github.ref_name }}

            Download the installer for your OS, run it, and follow the browser UI to connect your device to your PAN hub.

            ### Windows
            1. Download `pan-installer-win.exe`
            2. Double-click to run — Windows may show a SmartScreen warning, click **More info → Run anyway**
            3. Your browser will open automatically

            ### Linux
            ```bash
            chmod +x pan-installer-linux
            ./pan-installer-linux
            ```

            The installer:
            - Automatically finds PAN hubs on your local network (LAN + Tailscale)
            - Lets you paste an invite link if you're connecting remotely
            - Installs Node.js, downloads the PAN client, sets up auto-start
            - Hub owner must approve the device before it becomes active
          files: |
            service/bin/pan-installer-win.exe
            service/bin/pan-installer-linux
          draft: false
          prerelease: false
